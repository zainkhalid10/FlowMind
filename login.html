<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in to FlowMind</title>
  <link rel="stylesheet" href="static/css/style.css">
  <style>
    /* Login Page Specific Styles */
    body {
      background: #F5F5F3;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
    }

    .login-card {
      background: #FFFFFF;
      border: 0.5px solid rgba(0, 0, 0, 0.10);
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .login-logo {
      text-align: center;
      font-size: 20px;
      font-weight: 500;
      color: #1A1A1A;
      margin-bottom: 32px;
    }

    .login-logo span {
      color: #534AB7;
    }

    /* Tabs */
    .login-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 32px;
      border-bottom: 0.5px solid rgba(0, 0, 0, 0.10);
    }

    .login-tab {
      flex: 1;
      padding: 12px 0;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: #6B6B68;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }

    .login-tab:hover {
      color: #1A1A1A;
    }

    .login-tab.active {
      color: #534AB7;
      border-bottom-color: #534AB7;
    }

    /* Form content */
    .login-form-content {
      display: none;
    }

    .login-form-content.active {
      display: block;
    }

    /* Error message */
    .login-error {
      background: #FCEBEB;
      border: 0.5px solid rgba(163, 45, 45, 0.3);
      color: #A32D2D;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 16px;
      display: none;
    }

    .login-error.show {
      display: block;
    }

    .invite-note {
      display: none;
      background: #eef0ff;
      border: 0.5px solid rgba(83, 74, 183, 0.25);
      color: #37327a;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 12px;
    }

    /* Form fields */
    .login-form-group {
      margin-bottom: 16px;
    }

    .login-form-group label {
      display: block;
      font-size: 11px;
      color: #6B6B68;
      margin-bottom: 5px;
      font-weight: 500;
    }

    .login-form-group input {
      width: 100%;
      padding: 8px 12px;
      border: 0.5px solid rgba(0, 0, 0, 0.20);
      border-radius: 8px;
      font-size: 13px;
      color: #1A1A1A;
      background: #FFFFFF;
      outline: none;
      transition: border-color 0.15s;
    }

    .login-password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .login-password-wrapper input {
      width: 100%;
      padding-right: 36px;
    }

    .login-password-toggle {
      position: absolute;
      right: 10px;
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
      color: #6B6B68;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
    }

    .login-password-toggle:hover {
      color: #1A1A1A;
    }

    .login-form-group input:focus {
      border-color: #534AB7;
      box-shadow: 0 0 0 2px rgba(83, 74, 183, 0.1);
    }

    .login-form-group input::placeholder {
      color: #9B9B98;
    }

    /* Forgot password link */
    .login-forgot {
      text-align: right;
      margin-bottom: 16px;
    }

    .login-forgot a {
      font-size: 12px;
      color: #534AB7;
      transition: color 0.15s;
    }

    .login-forgot a:hover {
      color: #6259C4;
    }

    /* Submit button */
    .login-submit {
      width: 100%;
      padding: 10px;
      background: #534AB7;
      color: #FFFFFF;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .login-submit:hover:not(:disabled) {
      background: #6259C4;
    }

    .login-submit:disabled {
      background: #9B9B98;
      cursor: not-allowed;
      opacity: 0.7;
    }

    .login-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px 0;
      color: #9B9B98;
      font-size: 11px;
    }

    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 0.5px;
      background: rgba(0, 0, 0, 0.10);
    }

    .login-google {
      width: 100%;
      padding: 10px;
      background: #FFFFFF;
      color: #1A1A1A;
      border: 0.5px solid rgba(0, 0, 0, 0.20);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .login-google:hover {
      background: #F5F5F3;
    }

    /* Sign up link */
    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #6B6B68;
    }

    .login-footer a {
      color: #534AB7;
      cursor: pointer;
      font-weight: 500;
      transition: color 0.15s;
    }

    .login-footer a:hover {
      color: #6259C4;
    }

    /* Loading state */
    .login-submit.loading {
      position: relative;
      color: transparent;
    }

    .login-submit.loading::after {
      content: '⏳';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <!-- Logo -->
      <div class="login-logo">Flow<span>Mind</span></div>

      <!-- Tabs -->
      <div class="login-tabs">
        <div class="login-tab active" data-tab="signin">Sign in</div>
        <div class="login-tab" data-tab="signup">Create account</div>
      </div>

      <!-- Sign In Form -->
      <div class="login-form-content active" id="signin-form">
        <div class="login-error" id="signin-error"></div>
        <div class="invite-note" id="invite-note"></div>
        
        <form id="signinForm">
          <div class="login-form-group">
            <label for="signin-email">Email address</label>
            <input 
              type="email" 
              id="signin-email" 
              name="email" 
              placeholder="you@example.com" 
              required
              autocomplete="email"
            >
          </div>

          <div class="login-form-group">
            <label for="signin-password">Password</label>
            <div class="login-password-wrapper">
              <input 
                type="password" 
                id="signin-password" 
                name="password" 
                placeholder="••••••••" 
                required
                autocomplete="current-password"
              >
              <button type="button" class="login-password-toggle" onclick="togglePasswordVisibility('signin-password')">👁️</button>
            </div>
          </div>

          <div class="login-forgot">
            <a href="#forgot">Forgot password?</a>
          </div>

          <button type="submit" class="login-submit" id="signin-btn">Sign in</button>

          <div class="login-divider">or continue with</div>
          <button type="button" class="login-google" id="google-signin-btn">Continue with Google</button>
        </form>
      </div>

      <!-- Sign Up Form -->
      <div class="login-form-content" id="signup-form">
        <div class="login-error" id="signup-error"></div>
        
        <form id="signupForm">
          <div class="login-form-group">
            <label for="signup-name">Full name</label>
            <input 
              type="text" 
              id="signup-name" 
              name="name" 
              placeholder="John Doe" 
              required
              autocomplete="name"
            >
          </div>

          <div class="login-form-group">
            <label for="signup-email">Email address</label>
            <input 
              type="email" 
              id="signup-email" 
              name="email" 
              placeholder="you@example.com" 
              required
              autocomplete="email"
            >
          </div>

          <div class="login-form-group">
            <label for="signup-password">Password</label>
            <div class="login-password-wrapper">
              <input 
                type="password" 
                id="signup-password" 
                name="password" 
                placeholder="••••••••" 
                required
                autocomplete="new-password"
              >
              <button type="button" class="login-password-toggle" onclick="togglePasswordVisibility('signup-password')">👁️</button>
            </div>
          </div>

          <div class="login-form-group">
            <label for="signup-password-confirm">Confirm password</label>
            <div class="login-password-wrapper">
              <input 
                type="password" 
                id="signup-password-confirm" 
                name="password_confirm" 
                placeholder="••••••••" 
                required
                autocomplete="new-password"
              >
              <button type="button" class="login-password-toggle" onclick="togglePasswordVisibility('signup-password-confirm')">👁️</button>
            </div>
          </div>

          <button type="submit" class="login-submit" id="signup-btn">Create account</button>

          <div class="login-divider">or continue with</div>
          <button type="button" class="login-google" id="google-signup-btn">Sign up with Google</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = (window.location && window.location.origin)
      ? String(window.location.origin).replace(/\/$/, '')
      : 'http://localhost:8000';
    let forcedClientMode = false;

    function togglePasswordVisibility(inputId) {
      const input = document.getElementById(inputId);
      const button = input.parentElement.querySelector('.login-password-toggle');
      
      if (input.type === 'password') {
        input.type = 'text';
        button.textContent = '🙈';
      } else {
        input.type = 'password';
        button.textContent = '👁️';
      }
    }

    async function initializeInviteMode() {
      const params = new URLSearchParams(window.location.search || '');
      const inviteToken = params.get('invite_token');
      if (!inviteToken) {
        return;
      }

      const errorEl = document.getElementById('signin-error');
      try {
        const response = await fetch(API_BASE + '/auth/client-invite/resolve?token=' + encodeURIComponent(inviteToken));
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || 'Invalid invite link');
        }

        forcedClientMode = true;

        // Show sign-in only; hide account creation when user arrived from invite email.
        document.querySelectorAll('.login-tab').forEach(tab => {
          if (tab.dataset.tab === 'signup') {
            tab.style.display = 'none';
          }
        });
        document.getElementById('signup-form').style.display = 'none';

        const note = document.getElementById('invite-note');
        note.style.display = 'block';
        note.textContent = 'Client invite detected. Sign in with your invited credentials to open your review workspace.';

        const emailInput = document.getElementById('signin-email');
        emailInput.value = data.email || '';
        emailInput.readOnly = true;

        if (data.assigned_file_id) {
          localStorage.setItem('fm_assigned_file', String(data.assigned_file_id));
        }
      } catch (error) {
        errorEl.textContent = (error && error.message) ? error.message : 'Invalid invite link.';
        errorEl.classList.add('show');
      }
    }

    // Tab switching
    document.querySelectorAll('.login-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const tabName = tab.dataset.tab;
        
        // Update active tab
        document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        
        // Update active form
        document.querySelectorAll('.login-form-content').forEach(form => form.classList.remove('active'));
        document.getElementById(tabName + '-form').classList.add('active');
        
        // Clear errors
        document.querySelectorAll('.login-error').forEach(e => e.classList.remove('show'));
      });
    });

    // Sign In Handler
    document.getElementById('signinForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('signin-email').value;
      const password = document.getElementById('signin-password').value;
      const errorEl = document.getElementById('signin-error');
      const btnEl = document.getElementById('signin-btn');
      
      errorEl.classList.remove('show');
      btnEl.disabled = true;
      btnEl.classList.add('loading');
      
      try {
        const requestBody = { email, password };
        if (forcedClientMode) {
          requestBody.role = 'client';
        }

        const response = await fetch(API_BASE + '/auth/public/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(requestBody)
        });
        
        const data = await response.json();
        
        if (response.ok) {
          // Save token, role, and routing context.
          localStorage.setItem('fm_token', data.access_token);
          localStorage.setItem('access_token', data.access_token);
          const role = (data.role || (data.user && data.user.role) || 'manager').toLowerCase();
          const displayName = data.name || (data.user && (data.user.username || data.user.email)) || email;
          localStorage.setItem('fm_role', role);
          localStorage.setItem('fm_name', displayName);
          if (data.assigned_file_id) {
            localStorage.setItem('fm_assigned_file', String(data.assigned_file_id));
          } else if (role !== 'client') {
            localStorage.removeItem('fm_assigned_file');
          }
          window.location.href = role === 'client' ? '/client-review' : '/dashboard';
        } else {
          // Show error
          let msg = data.detail || 'Sign in failed. Please try again.';
          if (typeof msg === 'object' && msg !== null) {
            msg = msg.message || msg.detail || msg.msg || msg.error || JSON.stringify(msg);
            if (typeof msg === 'object' && msg !== null) {
              msg = msg.message || msg.detail || msg.msg || msg.error || JSON.stringify(msg);
            }
          }
          errorEl.textContent = msg;
          errorEl.classList.add('show');
        }
      } catch (error) {
        errorEl.textContent = 'An error occurred. Please try again.';
        errorEl.classList.add('show');
        console.error('Sign in error:', error);
      } finally {
        btnEl.disabled = false;
        btnEl.classList.remove('loading');
      }
    });

    // Sign Up Handler
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const passwordConfirm = document.getElementById('signup-password-confirm').value;
      const errorEl = document.getElementById('signup-error');
      const btnEl = document.getElementById('signup-btn');
      
      errorEl.classList.remove('show');
      
      // Validate passwords match
      if (password !== passwordConfirm) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.classList.add('show');
        return;
      }
      
      // Validate password strength (at least 6 characters)
      if (password.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters.';
        errorEl.classList.add('show');
        return;
      }
      
      btnEl.disabled = true;
      btnEl.classList.add('loading');
      
      try {
        const response = await fetch(API_BASE + '/auth/public/signup', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ name, email, password })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          // Save token, role, and routing context.
          localStorage.setItem('fm_token', data.access_token);
          localStorage.setItem('access_token', data.access_token);
          const role = (data.role || (data.user && data.user.role) || 'manager').toLowerCase();
          const displayName = data.name || (data.user && (data.user.username || data.user.email)) || name;
          localStorage.setItem('fm_role', role);
          localStorage.setItem('fm_name', displayName);
          if (data.assigned_file_id) {
            localStorage.setItem('fm_assigned_file', String(data.assigned_file_id));
          } else if (role !== 'client') {
            localStorage.removeItem('fm_assigned_file');
          }
          window.location.href = role === 'client' ? '/client-review' : '/dashboard';
        } else {
          // Show error
          let msg = data.detail || 'Sign up failed. Please try again.';
          if (typeof msg === 'object' && msg !== null) {
            msg = msg.message || msg.detail || msg.msg || msg.error || JSON.stringify(msg);
            if (typeof msg === 'object' && msg !== null) {
              msg = msg.message || msg.detail || msg.msg || msg.error || JSON.stringify(msg);
            }
          }
          errorEl.textContent = msg;
          errorEl.classList.add('show');
        }
      } catch (error) {
        errorEl.textContent = 'An error occurred. Please try again.';
        errorEl.classList.add('show');
        console.error('Sign up error:', error);
      } finally {
        btnEl.disabled = false;
        btnEl.classList.remove('loading');
      }
    });

    // Google OAuth handlers
    document.getElementById('google-signin-btn').addEventListener('click', () => {
      window.location.href = API_BASE + '/auth/google/init?role=manager&redirect_tab=login';
    });

    document.getElementById('google-signup-btn').addEventListener('click', () => {
      window.location.href = API_BASE + '/auth/google/init?role=manager&redirect_tab=signup';
    });

    initializeInviteMode();
  </script>
</body>
</html>
