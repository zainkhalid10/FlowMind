<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Approve Features - FlowMind</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at 20% 20%, rgba(102,126,234,0.25), transparent 35%),
                        radial-gradient(circle at 80% 0%, rgba(236,72,153,0.2), transparent 30%),
                        linear-gradient(135deg, #0f172a 0%, #111827 50%, #0b1021 100%);
            min-height: 100vh;
            padding: 24px;
            color: #0f172a;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 22px;
            box-shadow: 0 25px 70px rgba(15, 23, 42, 0.35);
            padding: 36px;
            backdrop-filter: blur(12px);
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
        }
        
        h1 {
            color: #0f172a;
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.01em;
        }
        
        .nav-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
            width: 100%;
            max-width: 420px;
        }
        
        .btn {
            padding: 12px 18px;
            border: 1px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.25s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
        }
        
        .btn-secondary {
            background: #0ea5e9;
            color: white;
        }
        
        .btn-ghost {
            background: transparent;
            color: #0f172a;
            border-color: #e2e8f0;
        }
        
        .btn:hover, .btn:focus-visible {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(99, 102, 241, 0.25);
        }
        
        .btn:focus-visible {
            outline: 2px solid #a5b4fc;
            outline-offset: 3px;
        }
        
        .nav-buttons .btn {
            min-width: 130px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            color: white;
        }
        
        .stat-card.total { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .stat-card.pending { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .stat-card.approved { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .stat-card.denied { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        
        .stat-number {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-select {
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            height: 44px;
            min-width: 150px;
        }
        
        .filter-select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        .filter-select:hover {
            border-color: #667eea;
        }
        
        .bulk-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }
        
        .bulk-actions.active {
            display: flex;
        }
        
        .features-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .feature-card {
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: #f8f9fa;
            transition: all 0.3s;
        }
        
        .feature-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }
        
        .feature-card.approved {
            border-color: #28a745;
            background: #d4edda;
        }
        
        .feature-card.denied {
            border-color: #dc3545;
            background: #f8d7da;
        }
        
        .feature-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .feature-meta {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .category-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: white;
        }
        
        .category-functional { background: #667eea; }
        .category-non_functional { background: #764ba2; }
        .category-user { background: #f093fb; }
        .category-business { background: #4facfe; }
        .category-other { background: #6c757d; }
        
        .quality-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: #ffc107;
            color: #333;
        }
        
        .feature-description {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        
        .feature-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        .btn-approve {
            background: #28a745;
            color: white;
            min-width: 110px;
            height: 38px;
        }
        
        .btn-deny {
            background: #dc3545;
            color: white;
            min-width: 110px;
            height: 38px;
        }
        
        .btn-approve:hover {
            background: #218838;
        }
        
        .btn-deny:hover {
            background: #c82333;
        }
        
        .btn-small {
            padding: 10px 20px;
            font-size: 14px;
            min-width: 100px;
            height: 38px;
        }
        
        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: white;
        }
        
        .status-pending { background: #ffc107; color: #333; }
        .status-approved { background: #28a745; }
        .status-denied { background: #dc3545; }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }
        
        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .search-box {
            width: 300px;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            height: 44px;
            transition: all 0.3s ease;
        }
        
        .search-box:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        .search-box:hover {
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Approve Features</h1>
            <div class="nav-buttons">
                <a href="/approve" class="btn btn-primary nav-btn">Approve</a>
                <a href="/dashboard" class="btn btn-secondary nav-btn">Dashboard</a>
                <button class="btn btn-ghost nav-btn" onclick="logoutUser()">Logout</button>
            </div>
        </div>
        
        <div class="stats" id="stats">
            <div class="stat-card total">
                <div class="stat-number" id="stat-total">-</div>
                <div class="stat-label">Total Features</div>
            </div>
            <div class="stat-card pending">
                <div class="stat-number" id="stat-pending">-</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card approved">
                <div class="stat-number" id="stat-approved">-</div>
                <div class="stat-label">Approved</div>
            </div>
            <div class="stat-card denied">
                <div class="stat-number" id="stat-denied">-</div>
                <div class="stat-label">Denied</div>
            </div>
        </div>
        
        <div class="filters">
            <select class="filter-select" id="documentFilter" style="min-width: 250px;">
                <option value="">All Documents</option>
            </select>
            
            <input type="text" class="search-box" id="searchBox" placeholder="🔍 Search features...">
            
            <select class="filter-select" id="statusFilter">
                <option value="">All Status</option>
                <option value="pending">Pending</option>
                <option value="approved">Approved</option>
                <option value="denied">Denied</option>
            </select>
            
            <select class="filter-select" id="categoryFilter">
                <option value="">All Categories</option>
                <option value="functional">Functional</option>
                <option value="non_functional">Non-Functional</option>
                <option value="user">User Stories</option>
                <option value="business">Business</option>
            </select>
            
            <button class="btn btn-secondary btn-small" onclick="selectAll()">Select All</button>
            <button class="btn btn-secondary btn-small" onclick="deselectAll()">Deselect All</button>
        </div>
        
        <div class="bulk-actions" id="bulkActions">
            <span style="font-weight: 600; margin-right: 10px;">Bulk Actions:</span>
            <button class="btn btn-approve btn-small" onclick="bulkApprove()">Approve Selected</button>
            <button class="btn btn-deny btn-small" onclick="bulkDeny()">Deny Selected</button>
        </div>
        
        <div id="featuresContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading features...</p>
            </div>
        </div>
    </div>
    
    <script>
        let allFeatures = [];
        let selectedFeatures = new Set();
        let currentFileId = null;
        
        // Load documents for the document filter
        async function loadDocuments() {
            try {
                const token = localStorage.getItem('access_token');
                if (!token) {
                    console.error('No token available for loadDocuments');
                    return;
                }
                
                console.log('Loading documents...');
                const response = await fetch('/api/documents', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.status === 401 || response.status === 403) {
                    localStorage.removeItem('access_token');
                    localStorage.removeItem('user');
                    window.location.href = '/login';
                    return;
                }
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('Documents loaded:', data.documents?.length || 0);
                    const select = document.getElementById('documentFilter');
                    if (!select) {
                        console.error('documentFilter element not found');
                        return;
                    }
                    
                    select.innerHTML = '<option value="">All Documents</option>';
                    
                    if (data.documents && data.documents.length > 0) {
                        data.documents.forEach(doc => {
                            const option = document.createElement('option');
                            option.value = doc.id.toString();
                            option.textContent = `${doc.filename} (${doc.feature_count} features)`;
                            select.appendChild(option);
                        });
                        console.log(`Added ${data.documents.length} documents to filter`);
                    } else {
                        console.log('No documents with features found');
                    }
                } else {
                    const errorText = await response.text();
                    console.error('Failed to load documents:', response.status, errorText);
                }
            } catch (error) {
                console.error('Error loading documents:', error);
            }
        }
        
        function logoutUser() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }
        
        // Check authentication on page load
        function checkAuth() {
            const token = localStorage.getItem('access_token');
            if (!token) {
                // Try to get token from URL query parameter
                const urlParams = new URLSearchParams(window.location.search);
                const urlToken = urlParams.get('token');
                if (urlToken) {
                    localStorage.setItem('access_token', urlToken);
                    // Remove token from URL
                    window.history.replaceState({}, document.title, '/approve');
                    return true;
                }
                // No token found, redirect to login
                window.location.href = '/login';
                return false;
            }
            return true;
        }
        
        async function loadStats() {
            try {
                const token = localStorage.getItem('access_token');
                if (!token) {
                    window.location.href = '/login';
                    return;
                }
                
                let url = '/api/features/stats';
                if (currentFileId) {
                    url += `?file_id=${parseInt(currentFileId)}`;
                }
                
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.status === 401 || response.status === 403) {
                    localStorage.removeItem('access_token');
                    localStorage.removeItem('user');
                    window.location.href = '/login';
                    return;
                }
                
                if (!response.ok) {
                    throw new Error('Failed to load stats');
                }
                
                const data = await response.json();
                
                document.getElementById('stat-total').textContent = data.total;
                document.getElementById('stat-pending').textContent = data.pending;
                document.getElementById('stat-approved').textContent = data.approved;
                document.getElementById('stat-denied').textContent = data.denied;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        async function loadFeatures() {
            try {
                const token = localStorage.getItem('access_token');
                if (!token) {
                    window.location.href = '/login';
                    return;
                }
                
                const documentFilter = document.getElementById('documentFilter').value;
                const statusFilter = document.getElementById('statusFilter').value;
                const categoryFilter = document.getElementById('categoryFilter').value;
                
                currentFileId = documentFilter ? parseInt(documentFilter) : null;
                
                let url = '/api/features?';
                if (documentFilter) url += `file_id=${parseInt(documentFilter)}&`;
                if (statusFilter) url += `status=${statusFilter}&`;
                if (categoryFilter) url += `category=${categoryFilter}`;
                
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.status === 401 || response.status === 403) {
                    localStorage.removeItem('access_token');
                    localStorage.removeItem('user');
                    window.location.href = '/login';
                    return;
                }
                
                if (!response.ok) {
                    throw new Error('Failed to load features');
                }
                
                const data = await response.json();
                console.log('Features loaded:', data.features?.length || 0, 'total:', data.total);
                allFeatures = data.features || [];
                renderFeatures(allFeatures);
                
            } catch (error) {
                console.error('Error loading features:', error);
                const container = document.getElementById('featuresContainer');
                if (container) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <h3>Error loading features</h3>
                            <p>${error.message}</p>
                            <p style="margin-top: 10px; font-size: 0.9rem; color: #64748b;">Check browser console for details.</p>
                        </div>
                    `;
                }
            }
        }
        
        function renderFeatures(features) {
            const container = document.getElementById('featuresContainer');
            
            if (features.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                        <h3>No features found</h3>
                        <p>Extract features from documents first</p>
                        <a href="/extract" class="btn btn-primary" style="margin-top: 20px;">Go to Extract</a>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = '<div class="features-list">' + features.map(feature => `
                <div class="feature-card ${feature.status}">
                    <div class="feature-header">
                        <div class="feature-meta">
                            <input type="checkbox" class="checkbox" data-id="${feature.id}" onchange="toggleSelection(${feature.id})">
                            <span class="category-badge category-${feature.category}">${formatCategory(feature.category)}</span>
                            ${feature.quality_score > 0 ? `<span class="quality-badge">Quality: ${feature.quality_score}/100</span>` : ''}
                            <span class="status-badge status-${feature.status}">${feature.status.toUpperCase()}</span>
                        </div>
                        <small style="color: #6c757d;">📄 ${feature.filename}</small>
                    </div>
                    <div class="feature-description">${feature.description}</div>
                    <div class="feature-actions">
                        ${feature.status !== 'approved' ? `<button class="btn btn-approve btn-small" onclick="updateStatus(${feature.id}, 'approved')">✓ Approve</button>` : ''}
                        ${feature.status !== 'denied' ? `<button class="btn btn-deny btn-small" onclick="updateStatus(${feature.id}, 'denied')">✗ Deny</button>` : ''}
                        ${feature.status !== 'pending' ? `<button class="btn btn-secondary btn-small" onclick="updateStatus(${feature.id}, 'pending')">⟲ Reset</button>` : ''}
                    </div>
                </div>
            `).join('') + '</div>';
        }
        
        function formatCategory(category) {
            const map = {
                'functional': 'Functional',
                'non_functional': 'Non-Functional',
                'user': 'User Story',
                'business': 'Business',
                'other': 'Other'
            };
            return map[category] || category;
        }
        
        async function updateStatus(featureId, status) {
            try {
                const token = localStorage.getItem('access_token');
                if (!token) {
                    alert('Please login to approve features');
                    window.location.href = '/login';
                    return;
                }
                
                const response = await fetch(`/api/features/${featureId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ status })
                });
                
                if (response.ok) {
                    await loadFeatures();
                    await loadStats();
                } else if (response.status === 401 || response.status === 403) {
                    // Authentication error - clear token and redirect
                    localStorage.removeItem('access_token');
                    localStorage.removeItem('user');
                    alert('Session expired. Please login again.');
                    window.location.href = '/login';
                } else {
                    const errorData = await response.json().catch(() => ({ detail: 'Failed to update feature status' }));
                    alert(`Failed to update feature: ${errorData.detail || 'Unknown error'}`);
                }
            } catch (error) {
                console.error('Error updating feature:', error);
                alert('Error updating feature status: ' + error.message);
            }
        }
        
        function toggleSelection(featureId) {
            const checkbox = document.querySelector(`input[data-id="${featureId}"]`);
            if (checkbox.checked) {
                selectedFeatures.add(featureId);
            } else {
                selectedFeatures.delete(featureId);
            }
            
            document.getElementById('bulkActions').classList.toggle('active', selectedFeatures.size > 0);
        }
        
        function selectAll() {
            document.querySelectorAll('.checkbox').forEach(cb => {
                cb.checked = true;
                selectedFeatures.add(parseInt(cb.dataset.id));
            });
            document.getElementById('bulkActions').classList.add('active');
        }
        
        function deselectAll() {
            document.querySelectorAll('.checkbox').forEach(cb => cb.checked = false);
            selectedFeatures.clear();
            document.getElementById('bulkActions').classList.remove('active');
        }
        
        async function bulkApprove() {
            if (selectedFeatures.size === 0) return;
            if (!confirm(`Approve ${selectedFeatures.size} features?`)) return;
            
            await bulkUpdate('approved');
        }
        
        async function bulkDeny() {
            if (selectedFeatures.size === 0) return;
            if (!confirm(`Deny ${selectedFeatures.size} features?`)) return;
            
            await bulkUpdate('denied');
        }
        
        async function bulkUpdate(status) {
            try {
                const token = localStorage.getItem('access_token');
                if (!token) {
                    alert('Please login to update features');
                    window.location.href = '/login';
                    return;
                }
                
                const response = await fetch('/api/features/bulk-update', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        feature_ids: Array.from(selectedFeatures),
                        status: status
                    })
                });
                
                if (response.ok) {
                    selectedFeatures.clear();
                    deselectAll();
                    await loadFeatures();
                    await loadStats();
                } else if (response.status === 401 || response.status === 403) {
                    // Authentication error - clear token and redirect
                    localStorage.removeItem('access_token');
                    localStorage.removeItem('user');
                    alert('Session expired. Please login again.');
                    window.location.href = '/login';
                } else {
                    const errorData = await response.json().catch(() => ({ detail: 'Failed to update features' }));
                    alert(`Failed to update features: ${errorData.detail || 'Unknown error'}`);
                }
            } catch (error) {
                console.error('Error updating features:', error);
                alert('Error updating features: ' + error.message);
            }
        }
        
        // Search functionality
        document.getElementById('searchBox').addEventListener('input', (e) => {
            const search = e.target.value.toLowerCase();
            const filtered = allFeatures.filter(f => 
                f.description.toLowerCase().includes(search) ||
                f.category.toLowerCase().includes(search)
            );
            renderFeatures(filtered);
        });
        
        // Filter change handlers
        document.getElementById('documentFilter').addEventListener('change', () => {
            loadStats();
            loadFeatures();
        });
        document.getElementById('statusFilter').addEventListener('change', loadFeatures);
        document.getElementById('categoryFilter').addEventListener('change', loadFeatures);
        
        // Initial load
        window.onload = () => {
            if (checkAuth()) {
                loadDocuments().then(() => {
                    loadStats();
                    loadFeatures();
                });
            }
        };
    </script>
</body>
</html>
