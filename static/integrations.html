<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrations - FlowMind</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: Inter, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%); min-height: 100vh; padding: 24px; color: #e0f2fe; }
        .card { background: rgba(255,255,255,0.95); color: #0f172a; border-radius: 12px; margin-bottom: 16px; }
        .card-header { font-weight: 600; padding: 12px 16px; border-bottom: 1px solid #e2e8f0; }
        .btn-save { background: linear-gradient(135deg, #06b6d4, #0891b2); color: white; border: none; }
        .btn-save:hover { opacity: 0.9; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="fas fa-plug text-primary"></i> Integrations</h1>
            <div>
                <a href="/integrations/log" class="btn btn-outline-light me-2"><i class="fas fa-list"></i> Integration Log</a>
                <a href="/manager" class="btn btn-outline-light me-2">Manager</a>
                <a href="/dashboard" class="btn btn-outline-light">Dashboard</a>
            </div>
        </div>
        <p class="text-white-50 mb-4">Manage Trello and Jira credentials for pushing requirements (Manager only).</p>
        <div id="error" class="alert alert-danger" style="display: none;"></div>
        <div id="success" class="alert alert-success" style="display: none;"></div>

        <div class="card">
            <div class="card-header"><i class="fab fa-trello me-2"></i> Trello</div>
            <div class="card-body">
                <div class="mb-2">
                    <label class="form-label">API Key</label>
                    <input type="password" class="form-control" id="trello_api_key" placeholder="TRELLO_API_KEY" autocomplete="off">
                </div>
                <div class="mb-2">
                    <label class="form-label">Token</label>
                    <input type="password" class="form-control" id="trello_token" placeholder="TRELLO_TOKEN" autocomplete="off">
                </div>
                <div class="mb-2">
                    <label class="form-label">List ID</label>
                    <input type="text" class="form-control" id="trello_list_id" placeholder="ID of the list where cards will be created">
                </div>
                <button type="button" class="btn btn-save" onclick="saveTrello()"><i class="fas fa-save"></i> Save Trello</button>
            </div>
        </div>

        <div class="card">
            <div class="card-header"><i class="fab fa-jira me-2"></i> Jira</div>
            <div class="card-body">
                <div class="mb-2">
                    <label class="form-label">Jira URL</label>
                    <input type="url" class="form-control" id="jira_url" placeholder="https://your-domain.atlassian.net">
                </div>
                <div class="mb-2">
                    <label class="form-label">Project Key</label>
                    <input type="text" class="form-control" id="jira_project_key" placeholder="e.g. PROJ">
                </div>
                <div class="mb-2">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="jira_email" placeholder="Your Jira account email">
                </div>
                <div class="mb-2">
                    <label class="form-label">API Token</label>
                    <input type="password" class="form-control" id="jira_api_token" placeholder="Jira API token" autocomplete="off">
                </div>
                <div class="mb-2">
                    <label class="form-label">Issue Type</label>
                    <input type="text" class="form-control" id="jira_issue_type" placeholder="Task (default)">
                </div>
                <button type="button" class="btn btn-save" onclick="saveJira()"><i class="fas fa-save"></i> Save Jira</button>
            </div>
        </div>
    </div>
    <script>
        const token = localStorage.getItem('access_token');
        if (!token) { window.location.href = '/login'; }
        const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

        function showSuccess(msg) {
            const el = document.getElementById('success');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(function() { el.style.display = 'none'; }, 4000);
        }
        function showError(msg) {
            document.getElementById('error').textContent = msg;
            document.getElementById('error').style.display = 'block';
        }

        async function loadConfig() {
            try {
                const r = await fetch('/api/integration/config', { headers });
                if (r.status === 403) { showError('Manager only.'); return; }
                if (r.status === 401) { window.location.href = '/login'; return; }
                if (!r.ok) throw new Error(r.statusText);
                const data = await r.json();
                const t = data.trello || {};
                document.getElementById('trello_api_key').value = t.api_key || '';
                document.getElementById('trello_token').value = t.token || '';
                document.getElementById('trello_list_id').value = t.list_id || '';
                const j = data.jira || {};
                document.getElementById('jira_url').value = j.url || '';
                document.getElementById('jira_project_key').value = j.project_key || '';
                document.getElementById('jira_email').value = j.email || '';
                document.getElementById('jira_api_token').value = j.api_token || '';
                document.getElementById('jira_issue_type').value = j.issue_type || 'Task';
            } catch (e) {
                showError(e.message || 'Failed to load config');
            }
        }

        async function saveTrello() {
            try {
                const r = await fetch('/api/integration/config', {
                    method: 'PUT',
                    headers,
                    body: JSON.stringify({
                        platform: 'trello',
                        config: {
                            api_key: document.getElementById('trello_api_key').value,
                            token: document.getElementById('trello_token').value,
                            list_id: document.getElementById('trello_list_id').value
                        }
                    })
                });
                if (r.status === 403) { showError('Manager only.'); return; }
                if (!r.ok) throw new Error(await r.text());
                showSuccess('Trello config saved.');
            } catch (e) {
                showError(e.message || 'Save failed');
            }
        }

        async function saveJira() {
            try {
                const r = await fetch('/api/integration/config', {
                    method: 'PUT',
                    headers,
                    body: JSON.stringify({
                        platform: 'jira',
                        config: {
                            url: document.getElementById('jira_url').value,
                            project_key: document.getElementById('jira_project_key').value,
                            email: document.getElementById('jira_email').value,
                            api_token: document.getElementById('jira_api_token').value,
                            issue_type: document.getElementById('jira_issue_type').value || 'Task'
                        }
                    })
                });
                if (r.status === 403) { showError('Manager only.'); return; }
                if (!r.ok) throw new Error(await r.text());
                showSuccess('Jira config saved.');
            } catch (e) {
                showError(e.message || 'Save failed');
            }
        }

        loadConfig();
    </script>
</body>
</html>
