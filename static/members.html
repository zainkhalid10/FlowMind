<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members - FlowMind</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: Inter, sans-serif; background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #1d4ed8 100%); min-height: 100vh; padding: 24px; color: #e0f2fe; }
        .card { background: rgba(15,23,42,0.86); color: #e2e8f0; border-radius: 12px; margin-bottom: 16px; border: 1px solid rgba(96,165,250,0.18); }
        .card-header { font-weight: 600; padding: 12px 16px; border-bottom: 1px solid rgba(96,165,250,0.16); }
        .table th { background: rgba(15,23,42,0.96); color: #f8fafc; }
        .table td, .table tbody, .table { color: #e2e8f0; }
        .form-select { background: rgba(15,23,42,0.96); color: #f8fafc; border-color: rgba(96,165,250,0.18); }
        .btn-save { background: linear-gradient(135deg, #06b6d4, #0891b2); color: white; border: none; }
        .btn-save:hover { opacity: 0.9; color: white; }
        .btn-save:disabled { opacity: 0.6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="fas fa-user-friends text-primary"></i> Members &amp; Teams</h1>
            <div>
                <a href="/manager" class="btn btn-outline-light me-2"><i class="fas fa-users-cog"></i> Manager</a>
                <a href="/dashboard" class="btn btn-outline-light me-2">Dashboard</a>
                <a href="/" class="btn btn-outline-light">Home</a>
            </div>
        </div>
        <p class="text-white-50 mb-4">Assign users to teams and set roles (Team Head / Member). Only managers can access this page.</p>
        <div id="error" class="alert alert-danger" style="display: none;"></div>
        <div id="success" class="alert alert-success" style="display: none;"></div>
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span>All members</span>
                <span class="badge bg-primary" id="count">0</span>
            </div>
            <div class="card-body p-0 overflow-auto">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Team</th>
                            <th>Role</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="members-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        const token = localStorage.getItem('access_token');
        if (!token) { window.location.href = '/'; }
        const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

        function showSuccess(msg) {
            const el = document.getElementById('success');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(function() { el.style.display = 'none'; }, 4000);
        }
        function showError(msg) {
            document.getElementById('error').textContent = msg;
            document.getElementById('error').style.display = 'block';
        }
        function hideError() {
            document.getElementById('error').style.display = 'none';
        }

        async function load() {
            try {
                hideError();
                const r = await fetch('/api/members?token=' + encodeURIComponent(token), { headers });
                if (r.status === 403) {
                    showError('Access denied. Only managers can view and edit members.');
                    return;
                }
                if (!r.ok) throw new Error(r.statusText);
                const data = await r.json();
                const members = data.members || [];
                const teams = data.teams || [];
                document.getElementById('count').textContent = members.length;

                const tbody = document.getElementById('members-tbody');
                tbody.innerHTML = '';
                members.forEach(u => {
                    const tr = document.createElement('tr');
                    tr.dataset.userId = u.id;
                    const teamSelect = document.createElement('select');
                    teamSelect.className = 'form-select form-select-sm';
                    teamSelect.innerHTML = '<option value="">-- No team --</option>' +
                        teams.map(t => '<option value="' + t.id + '"' + (u.team_id === t.id ? ' selected' : '') + '>' + (t.name || '') + '</option>').join('');
                    const roleSelect = document.createElement('select');
                    roleSelect.className = 'form-select form-select-sm';
                    roleSelect.innerHTML =
                        '<option value="member"' + (u.role === 'member' ? ' selected' : '') + '>Member</option>' +
                        '<option value="team_head"' + (u.role === 'team_head' ? ' selected' : '') + '>Team Head</option>' +
                        (u.role === 'manager' ? '<option value="manager" selected>Manager</option>' : '');
                    const btn = document.createElement('button');
                    btn.className = 'btn btn-sm btn-save';
                    btn.innerHTML = '<i class="fas fa-save"></i> Save';
                    btn.onclick = function() { saveUser(u.id, teamSelect.value, roleSelect.value, btn); };
                    tr.innerHTML = '<td><strong>' + (u.username || '') + '</strong><br><small class="text-muted">' + (u.email || '') + '</small></td>' +
                        '<td></td><td></td><td></td>';
                    tr.querySelector('td:nth-child(2)').appendChild(teamSelect);
                    tr.querySelector('td:nth-child(3)').appendChild(roleSelect);
                    tr.querySelector('td:nth-child(4)').appendChild(btn);
                    tbody.appendChild(tr);
                });
            } catch (e) {
                showError(e.message || 'Failed to load members');
            }
        }

        async function saveUser(userId, teamId, role, btn) {
            btn.disabled = true;
            try {
                const body = { team_id: teamId === '' || teamId === undefined ? null : parseInt(teamId, 10), role: role || undefined };
                const r = await fetch('/api/users/' + userId + '?token=' + encodeURIComponent(token), {
                    method: 'PATCH',
                    headers,
                    body: JSON.stringify(body)
                });
                const j = await r.json().catch(() => ({}));
                if (!r.ok) {
                    showError(j.detail || r.statusText || 'Update failed');
                    return;
                }
                showSuccess('Saved.');
            } catch (e) {
                showError(e.message || 'Request failed');
            } finally {
                btn.disabled = false;
            }
        }

        load();
    </script>
</body>
</html>
