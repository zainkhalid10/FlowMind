<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integration Log - FlowMind</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: Inter, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%); min-height: 100vh; padding: 24px; color: #e0f2fe; }
        .card { background: rgba(255,255,255,0.95); color: #0f172a; border-radius: 12px; margin-bottom: 16px; }
        .card-header { font-weight: 600; padding: 12px 16px; border-bottom: 1px solid #e2e8f0; }
        .table th { background: #f8fafc; }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="fas fa-list-alt text-primary"></i> Integration Log (D2)</h1>
            <div>
                <a href="/integrations" class="btn btn-outline-light me-2"><i class="fas fa-plug"></i> Integrations</a>
                <a href="/manager" class="btn btn-outline-light me-2">Manager</a>
                <a href="/dashboard" class="btn btn-outline-light">Dashboard</a>
            </div>
        </div>
        <p class="text-white-50 mb-4">History of Trello/Jira pushes (Manager only).</p>
        <div id="error" class="alert alert-danger" style="display: none;"></div>
        <div class="card">
            <div class="card-body p-0 overflow-auto">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>User</th>
                            <th>Platform</th>
                            <th>Source</th>
                            <th>Count</th>
                            <th>Message</th>
                            <th>Details</th>
                        </tr>
                    </thead>
                    <tbody id="log-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        const token = localStorage.getItem('access_token');
        if (!token) { window.location.href = '/login'; }
        const headers = { 'Authorization': 'Bearer ' + token };

        async function loadLog() {
            try {
                const r = await fetch('/api/integration/log?limit=100', { headers });
                if (r.status === 403) { document.getElementById('error').textContent = 'Manager only.'; document.getElementById('error').style.display = 'block'; return; }
                if (r.status === 401) { window.location.href = '/login'; return; }
                if (!r.ok) throw new Error(r.statusText);
                const data = await r.json();
                const tbody = document.getElementById('log-tbody');
                tbody.innerHTML = '';
                (data.entries || []).forEach(function(entry) {
                    const tr = document.createElement('tr');
                    const created = entry.created_at ? new Date(entry.created_at).toLocaleString() : '-';
                    let detailsHtml = '';
                    if (entry.details) {
                        try {
                            const arr = JSON.parse(entry.details);
                            const links = (arr || []).filter(function(x) { return x.url || x.key; }).slice(0, 3);
                            detailsHtml = links.map(function(x) {
                                const u = x.url || (x.key ? '#' : '');
                                const t = x.key || (x.url ? 'Link' : '');
                                return u ? '<a target="_blank" href="' + u + '">' + (t || 'Link') + '</a>' : (x.key || '');
                            }).join(', ');
                            if ((arr || []).length > 3) detailsHtml += ' ...';
                        } catch (_) { detailsHtml = entry.message || ''; }
                    }
                    tr.innerHTML = '<td>' + created + '</td><td>' + (entry.username || '-') + '</td><td>' + (entry.platform || '') + '</td><td>' + (entry.source || '') + '</td><td>' + (entry.success_count || 0) + '/' + (entry.items_count || 0) + '</td><td>' + (entry.message || '').slice(0, 60) + '</td><td>' + detailsHtml + '</td>';
                    tbody.appendChild(tr);
                });
            } catch (e) {
                document.getElementById('error').textContent = e.message || 'Failed to load log';
                document.getElementById('error').style.display = 'block';
            }
        }

        loadLog();
    </script>
</body>
</html>
