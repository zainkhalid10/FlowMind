<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowMind - Requirements</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');

    :root {
      --fm-bg: #f3f6f8;
      --fm-bg-accent: #eaf0f4;
      --fm-surface: #ffffff;
      --fm-surface-muted: #f7fafc;
      --fm-border: #d9e3ea;
      --fm-border-strong: #c2d0da;
      --fm-text: #10222f;
      --fm-text-muted: #556675;
      --fm-primary: #0f6cbd;
      --fm-primary-strong: #0b5aa0;
      --fm-focus: rgba(15, 108, 189, 0.2);
      --fm-shadow-soft: 0 10px 24px rgba(16, 34, 47, 0.07);
    }

    body {
      font-family: 'Manrope', 'Segoe UI', sans-serif;
      color: var(--fm-text);
      background:
        radial-gradient(900px 400px at 10% -10%, var(--fm-bg-accent), transparent),
        var(--fm-bg);
    }

    body.modal-open {
      overflow: hidden;
    }

    .fm-sidebar {
      width: 200px;
      background: var(--fm-surface);
      border-right: 1px solid var(--fm-border);
      box-shadow: 6px 0 24px rgba(16, 34, 47, 0.05);
      padding: 18px 0;
    }

    .fm-logo {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--fm-text);
      border-bottom: 1px solid var(--fm-border);
      padding: 0 18px 18px;
      margin-bottom: 14px;
    }

    .fm-logo span {
      color: var(--fm-primary);
    }

    .fm-main {
      margin-left: 200px;
      padding: 26px;
    }

    .fm-topbar {
      margin-bottom: 18px;
    }

    .fm-page-title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.1px;
      color: var(--fm-text);
      margin-bottom: 2px;
    }

    .fm-btn-primary {
      background: var(--fm-primary);
      border: 1px solid var(--fm-primary);
      border-radius: 10px;
      padding: 8px 14px;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(15, 108, 189, 0.2);
    }

    .fm-btn-primary:hover {
      background: var(--fm-primary-strong);
      border-color: var(--fm-primary-strong);
    }

    .fm-btn-outline {
      border: 1px solid var(--fm-border-strong);
      color: var(--fm-text);
      background: var(--fm-surface);
    }

    .fm-btn-outline:hover {
      background: var(--fm-surface-muted);
      border-color: var(--fm-primary);
    }

    .fm-input {
      border: 1px solid var(--fm-border-strong);
      border-radius: 10px;
      padding: 9px 12px;
      color: var(--fm-text);
      background: var(--fm-surface);
    }

    .fm-input:focus {
      border-color: var(--fm-primary);
      box-shadow: 0 0 0 3px var(--fm-focus);
    }

    .fm-label {
      color: var(--fm-text-muted);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.2px;
      text-transform: uppercase;
    }

    .fm-badge {
      font-weight: 700;
      letter-spacing: 0.2px;
      border-radius: 999px;
    }

    .req-top-sub {
      color: var(--fm-text-muted);
      font-size: 12px;
      margin-top: 3px;
    }

    .filter-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px 0 16px;
      flex-wrap: wrap;
      background: var(--fm-surface);
      border: 1px solid var(--fm-border);
      border-radius: 14px;
      padding: 12px;
      box-shadow: var(--fm-shadow-soft);
    }

    .view-tabs {
      display: flex;
      gap: 8px;
      margin: 8px 0 14px;
      flex-wrap: wrap;
      background: var(--fm-surface);
      border: 1px solid var(--fm-border);
      border-radius: 14px;
      padding: 8px;
      box-shadow: var(--fm-shadow-soft);
    }

    .view-tab {
      border: 1px solid var(--fm-border-strong);
      background: var(--fm-surface);
      color: var(--fm-text-muted);
      border-radius: 999px;
      padding: 7px 13px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .view-tab.active {
      background: var(--fm-primary);
      color: #FFFFFF;
      border-color: var(--fm-primary);
    }

    .filter-search {
      min-width: 280px;
      flex: 1;
    }

    .filter-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-pill {
      border: 1px solid var(--fm-border);
      background: var(--fm-surface);
      color: var(--fm-text-muted);
      border-radius: 20px;
      padding: 6px 11px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }

    .filter-pill.active {
      background: var(--fm-primary);
      color: #FFFFFF;
      border-color: var(--fm-primary);
    }

    .req-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .req-card {
      display: grid;
      grid-template-columns: 8px 1fr;
      border: 1px solid var(--fm-border);
      border-radius: 14px;
      background: var(--fm-surface);
      overflow: hidden;
      box-shadow: var(--fm-shadow-soft);
      transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
    }

    .req-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 30px rgba(16, 34, 47, 0.1);
      border-color: #b6c9d8;
    }

    .req-color {
      background: #534AB7;
    }

    .req-content {
      padding: 14px 16px;
    }

    .req-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--fm-text);
      margin-bottom: 5px;
    }

    .req-title, .requirement-title, .fm-req-title {
      white-space: normal !important;
      overflow: visible !important;
      text-overflow: unset !important;
      word-wrap: break-word;
      line-height: 1.5;
    }

    .req-desc {
      color: var(--fm-text-muted);
      font-size: 12px;
      margin-bottom: 10px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .req-footer {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .req-btn {
      border: 1px solid var(--fm-border-strong);
      background: var(--fm-surface);
      color: var(--fm-text);
      border-radius: 9px;
      padding: 5px 11px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .req-btn:hover {
      border-color: var(--fm-primary);
      color: var(--fm-primary);
      background: #f3f9ff;
    }

    .req-btn-edit {
      margin-left: auto;
    }

    .req-btn[disabled] {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .req-btn-danger {
      color: #A32D2D;
      border-color: rgba(163,45,45,0.45);
      background: #FCEBEB;
    }

    .req-btn-danger:hover {
      color: #8b2222;
      border-color: rgba(139,34,34,0.55);
      background: #f9dddd;
    }

    .req-edit-wrap {
      display: none;
      margin-top: 8px;
      gap: 8px;
      flex-direction: column;
    }

    .req-edit-actions {
      display: flex;
      gap: 8px;
    }

    .file-picker-wrap {
      margin: 10px 0 14px;
      max-width: 420px;
    }

    .empty-state {
      border: 1px dashed var(--fm-border-strong);
      border-radius: 12px;
      background: var(--fm-surface);
      padding: 24px;
      color: var(--fm-text-muted);
      text-align: center;
      font-size: 12px;
    }

    .skeleton-card {
      height: 92px;
      border-radius: 12px;
      background: linear-gradient(90deg, #efefef 25%, #e5e5e5 37%, #efefef 63%);
      background-size: 400% 100%;
      animation: shimmer 1.2s ease-in-out infinite;
    }

    .insight-list {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      margin-top: 10px;
    }

    #insightViewSection {
      border: 1px solid var(--fm-border);
      border-radius: 14px;
      background: var(--fm-surface);
      box-shadow: var(--fm-shadow-soft);
      padding: 12px;
    }

    #insightTopMeta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--fm-border);
      border-radius: 999px;
      background: #eef6fd;
      color: #12446f;
      padding: 6px 12px;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.15px;
    }

    .insight-card {
      border: 1px solid var(--fm-border);
      border-radius: 14px;
      background: var(--fm-surface);
      padding: 12px;
      box-shadow: var(--fm-shadow-soft);
      transition: transform 0.16s ease, box-shadow 0.16s ease;
      animation: riseIn 0.24s ease both;
    }

    .insight-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 30px rgba(16, 34, 47, 0.1);
    }

    .insight-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--fm-text);
      margin-bottom: 8px;
    }

    .insight-note {
      font-size: 12px;
      color: var(--fm-text-muted);
      background: var(--fm-surface-muted);
      border: 1px solid var(--fm-border);
      border-radius: 8px;
      padding: 8px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .insight-thumb {
      width: 100%;
      max-height: 190px;
      object-fit: contain;
      background: var(--fm-surface-muted);
      border: 1px solid var(--fm-border);
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: zoom-in;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .insight-thumb:hover {
      transform: scale(1.012);
      box-shadow: 0 10px 18px rgba(16, 34, 47, 0.12);
    }

    .insight-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .insight-actions .fm-btn-primary,
    .insight-actions .fm-btn-outline {
      min-height: 30px;
      font-weight: 700;
    }

    .insight-modal {
      position: fixed;
      inset: 0;
      background: rgba(5, 16, 26, 0.56);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1200;
      padding: 18px;
    }

    .insight-modal.open {
      display: flex;
    }

    .insight-modal-card {
      width: min(980px, 100%);
      max-height: 92vh;
      overflow: auto;
      background: var(--fm-surface);
      border-radius: 14px;
      border: 1px solid var(--fm-border);
      padding: 16px;
      box-shadow: 0 24px 50px rgba(5, 16, 26, 0.3);
    }

    .insight-modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--fm-surface);
      padding-bottom: 8px;
      border-bottom: 1px solid var(--fm-border);
    }

    .insight-modal-img {
      width: 100%;
      max-height: 56vh;
      object-fit: contain;
      background: var(--fm-surface-muted);
      border: 1px solid var(--fm-border);
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .insight-modal-note {
      font-size: 12px;
      color: var(--fm-text);
      background: var(--fm-surface-muted);
      border: 1px solid var(--fm-border);
      border-radius: 8px;
      padding: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 980px) {
      .fm-sidebar {
        width: 100%;
        height: auto;
        position: static;
        border-right: 0;
        border-bottom: 1px solid var(--fm-border);
        box-shadow: none;
      }

      .fm-main {
        margin-left: 0;
        padding: 16px;
      }

      .fm-topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .filter-bar {
        gap: 8px;
        padding: 10px;
      }

      .view-tabs {
        padding: 7px;
      }
    }

    @keyframes shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: 0 0; }
    }
  </style>
</head>

  <script>
    requireAuth();

    let currentFileId = new URLSearchParams(window.location.search).get('file_id');
    let allRequirements = [];
    let activeType = 'all';
    let searchTerm = '';
    let currentFilename = '';
    let activeView = 'requirements';
    let visualInsights = { detected_patterns: 0, images_detected: 0, images: [] };

    const typeOrder = ['all', 'functional', 'non-functional', 'business', 'system'];
    const typeLabels = {
      all: 'All',
      functional: 'Functional',
      'non-functional': 'Non-functional',
      business: 'Business',
      system: 'System'
    };

    const typeColor = {
      functional: '#534AB7',
      'non-functional': '#1D9E75',
      business: '#BA7517',
      system: '#D85A30'
    };

    function normalizeType(category) {
      const c = String(category || '').trim().toLowerCase();
      if (c.includes('non') || c.includes('non_functional') || c.includes('non-functional')) return 'non-functional';
      if (c.includes('business')) return 'business';
      if (c.includes('system')) return 'system';
      return 'functional';
    }

    function buildReadableTitle(item, fallbackNumber) {
      const rawTitle = String(item.title || '').trim();
      const desc = String(item.description || '').trim();
      const cleanDescFirstLine = desc.split(/\n+/)[0].trim();
      const generic = /^requirements?$|^constraints?\.?$|^requirement\s*\d*$/i;

      let title = rawTitle;
      if (!title || generic.test(title) || (cleanDescFirstLine && title.toLowerCase() === cleanDescFirstLine.toLowerCase())) {
        title = cleanDescFirstLine || ('Requirement ' + fallbackNumber);
      }

      return title;
    }

    function priorityClass(priority) {
      const p = String(priority || '').toLowerCase();
      if (p === 'high') return 'badge-danger';
      if (p === 'low') return 'badge-success';
      return 'badge-warning';
    }

    function setHeaderText() {
      const count = getFilteredRequirements().length;
      const filename = currentFilename || 'Selected file';
      document.getElementById('reqTopSub').textContent = count + ' items · ' + filename;
    }

    function getFilteredRequirements() {
      return allRequirements.filter(item => {
        const t = normalizeType(item.category);
        const matchesType = activeType === 'all' ? true : t === activeType;
        const content = (String(item.req_id || '') + ' ' + String(item.title || '') + ' ' + String(item.description || '')).toLowerCase();
        const matchesSearch = !searchTerm || content.includes(searchTerm);
        return matchesType && matchesSearch;
      });
    }

    function mapFeatureToRequirement(feature) {
      const id = feature.id;
      const description = String(feature.description || feature.text || feature.content || '').trim();
      const firstLine = description.split(/\n+/)[0] || '';
      const titleSeed = firstLine;
      const featurePriority = String(feature.priority || '').trim();
      const priority = featurePriority || 'Medium';

      return {
        req_id: String(id),
        title: titleSeed || ('Requirement ' + String(id)),
        description: description || '-',
        category: feature.category || 'functional',
        priority,
        _source: 'feature',
        _feature_id: id
      };
    }

    function annotateLocalNumbers(items) {
      return (items || []).map((item, idx) => ({ ...item, local_no: idx + 1 }));
    }

    function parseRequirementsPayload(payload) {
      if (Array.isArray(payload)) {
        payload.forEach(req => console.log('REQ OBJECT:', req));
        return payload;
      }
      if (payload && Array.isArray(payload.requirements)) {
        payload.requirements.forEach(req => console.log('REQ OBJECT:', req));
        return payload.requirements;
      }
      if (payload && Array.isArray(payload.features)) {
        payload.features.forEach(req => console.log('REQ OBJECT:', req));
        return payload.features.map(mapFeatureToRequirement);
      }
      return [];
    }

    function countByType(items) {
      const map = { all: items.length, functional: 0, 'non-functional': 0, business: 0, system: 0 };
      items.forEach(item => {
        const t = normalizeType(item.category);
        map[t] += 1;
      });
      return map;
    }

    function renderPills() {
      const counts = countByType(allRequirements);
      const holder = document.getElementById('filterPills');
      holder.innerHTML = typeOrder.map(key => {
        const active = key === activeType ? 'active' : '';
        return '<button class="filter-pill ' + active + '" data-type="' + key + '">' + typeLabels[key] + ' (' + counts[key] + ')</button>';
      }).join('');

      holder.querySelectorAll('.filter-pill').forEach(btn => {
        btn.addEventListener('click', () => {
          activeType = btn.dataset.type;
          renderPills();
          renderRequirements();
        });
      });
    }

    function renderLoading() {
      const list = document.getElementById('requirementsViewSection');
      list.innerHTML = '<div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div>';
    }

    function renderInsights() {
      const top = document.getElementById('insightTopMeta');
      const list = document.getElementById('insightList');
      const images = Array.isArray(visualInsights.images) ? visualInsights.images : [];

      top.textContent = 'Patterns detected: ' + Number(visualInsights.detected_patterns || 0)
        + ' · Images detected: ' + Number(visualInsights.images_detected || 0);

      if (!images.length) {
        list.innerHTML = '<div class="empty-state">No images or patterns were extracted for this file.</div>';
        return;
      }

      list.innerHTML = images.map((img, idx) => {
        const title = 'Image ' + (idx + 1) + (img.page_number ? (' · Page ' + img.page_number) : '');
        const thumb = img.image_url
          ? '<img class="insight-thumb" data-open-insight="' + idx + '" src="' + img.image_url + '" alt="Extracted image">'
          : '';
        const safeNote = String(img.agent_note || 'No insight available.')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
        return '<article class="insight-card">'
          + '<div class="insight-title">' + title + '</div>'
          + '<div class="insight-actions"><button class="fm-btn-outline fm-btn-sm" data-open-insight="' + idx + '">Open image</button><button class="fm-btn-primary fm-btn-sm" data-explain-insight="' + idx + '">View agent summary</button></div>'
          + thumb
          + '<div class="insight-note"><strong>Agent insight:</strong> ' + safeNote + '</div>'
          + '</article>';
      }).join('');

      list.querySelectorAll('[data-open-insight]').forEach(el => {
        el.addEventListener('click', () => {
          const idx = Number(el.getAttribute('data-open-insight'));
          openInsightModal(idx);
        });
      });

      list.querySelectorAll('[data-explain-insight]').forEach(el => {
        el.addEventListener('click', async () => {
          const idx = Number(el.getAttribute('data-explain-insight'));
          await explainInsight(idx);
        });
      });
    }

    async function explainInsight(idx) {
      const img = (visualInsights.images || [])[idx];
      if (!img || !currentFileId) return;

      const title = 'Image ' + (idx + 1) + (img.page_number ? (' · Page ' + img.page_number) : '');
      document.getElementById('insightModalTitle').textContent = title;
      document.getElementById('insightModalImage').src = img.image_url || '';
      document.getElementById('insightModalNote').textContent = 'Analyzing image with AI...';
      document.getElementById('insightModal').classList.add('open');
      document.body.classList.add('modal-open');

      try {
        const res = await apiFetch('/api/files/' + encodeURIComponent(currentFileId) + '/visual-analysis/explain', {
          method: 'POST',
          body: JSON.stringify({
            image_id: String(img.id || ''),
            image_url: String(img.image_url || ''),
            ocr_text: String(img.ocr_text || '')
          })
        });
        if (!res.ok) throw new Error();

        const data = await res.json();
        let detail = String(data.explanation || img.agent_note || 'No insight available.').trim();

        if (Array.isArray(data.extracted_requirements) && data.extracted_requirements.length) {
          detail += '\n\nPotential requirements from this visual:\n- ' + data.extracted_requirements.slice(0, 6).join('\n- ');
        }
        if (data.learning_hint) {
          detail += '\n\nLearning hint:\n' + String(data.learning_hint);
        }

        img.agent_note = String(data.explanation || img.agent_note || '').trim();
        document.getElementById('insightModalNote').textContent = detail;
      } catch (e) {
        document.getElementById('insightModalNote').textContent = 'Could not generate AI explanation for this image right now.';
      }
    }

    function openInsightModal(idx) {
      const img = (visualInsights.images || [])[idx];
      if (!img) return;
      const title = 'Image ' + (idx + 1) + (img.page_number ? (' · Page ' + img.page_number) : '');
      const note = String(img.agent_note || 'No insight available.').trim();
      const ocr = String(img.ocr_text || '').trim();
      const detail = note + (ocr ? ('\n\nOCR excerpt:\n' + ocr.slice(0, 1200)) : '');

      document.getElementById('insightModalTitle').textContent = title;
      document.getElementById('insightModalImage').src = img.image_url || '';
      document.getElementById('insightModalNote').textContent = detail;
      document.getElementById('insightModal').classList.add('open');
      document.body.classList.add('modal-open');
    }

    function closeInsightModal() {
      const modal = document.getElementById('insightModal');
      modal.classList.remove('open');
      document.body.classList.remove('modal-open');
    }

    async function loadVisualInsights() {
      if (!currentFileId) {
        visualInsights = { detected_patterns: 0, images_detected: 0, images: [] };
        renderInsights();
        return;
      }

      try {
        const res = await apiFetch('/api/files/' + encodeURIComponent(currentFileId) + '/visual-analysis');
        if (!res.ok) throw new Error();
        const data = await res.json();
        visualInsights = {
          detected_patterns: Number(data.detected_patterns || 0),
          images_detected: Number(data.images_detected || 0),
          images: Array.isArray(data.images) ? data.images : []
        };
      } catch (e) {
        visualInsights = { detected_patterns: 0, images_detected: 0, images: [] };
      }

      renderInsights();
    }

    function setActiveView(view) {
      activeView = view;
      const reqTab = document.getElementById('reqViewTab');
      const insightTab = document.getElementById('insightViewTab');
      const reqSection = document.getElementById('requirementsViewSection');
      const insightSection = document.getElementById('insightViewSection');

      reqTab.classList.toggle('active', view === 'requirements');
      insightTab.classList.toggle('active', view === 'insights');
      reqSection.style.display = view === 'requirements' ? '' : 'none';
      insightSection.style.display = view === 'insights' ? '' : 'none';
    }

    function renderRequirements() {
      const list = document.getElementById('requirementsViewSection');
      const items = getFilteredRequirements();
      setHeaderText();

      if (!items.length) {
        list.innerHTML = '<div class="empty-state">No requirements match your current filters.</div>';
        return;
      }

      list.innerHTML = items.map(item => {
        const t = normalizeType(item.category);
        const displayNo = item.local_no || item.req_id || '1';
        const readableTitle = buildReadableTitle(item, displayNo);
        const reqDescription = String(item.description || item.text || item.content || '-');
        const editId = 'edit-' + String(item.req_id).replace(/[^a-zA-Z0-9_-]/g, '_');
        const removeId = 'remove-' + String(item.req_id).replace(/[^a-zA-Z0-9_-]/g, '_');
        const titleInputId = 'title-' + editId;
        const descInputId = 'desc-' + editId;
        return '<article class="req-card" data-req-id="' + item.req_id + '">' +
          '<div class="req-color" style="background:' + (typeColor[t] || '#534AB7') + ';"></div>' +
          '<div class="req-content">' +
            '<div class="req-title">REQ-' + displayNo + ' · ' + readableTitle + '</div>' +
            '<div class="req-desc">' + reqDescription + '</div>' +
            '<div class="req-footer">' +
              '<span class="fm-badge badge-info">' + typeLabels[t] + '</span>' +
              '<span class="fm-badge ' + priorityClass(item.priority) + '">' + (item.priority || 'Medium') + '</span>' +
              '<button id="' + editId + '" class="req-btn req-btn-edit">Edit</button>' +
              '<button id="' + removeId + '" class="req-btn req-btn-danger">Remove</button>' +
            '</div>' +
            '<div class="req-edit-wrap" id="wrap-' + editId + '">' +
              '<input id="' + titleInputId + '" class="fm-input" value="' + String(item.title || '').replace(/"/g, '&quot;') + '">' +
              '<textarea id="' + descInputId + '" class="fm-input" rows="3">' + reqDescription + '</textarea>' +
              '<div class="req-edit-actions">' +
                '<button class="fm-btn-primary fm-btn-sm" data-action="save" data-req="' + item.req_id + '">Save</button>' +
                '<button class="fm-btn-outline fm-btn-sm" data-action="cancel" data-target="wrap-' + editId + '">Cancel</button>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</article>';
      }).join('');

      items.forEach(item => bindCardActions(item));
      list.querySelectorAll('[data-action="cancel"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const target = document.getElementById(btn.dataset.target);
          if (target) target.style.display = 'none';
        });
      });
      list.querySelectorAll('[data-action="save"]').forEach(btn => {
        btn.addEventListener('click', async () => {
          await saveRequirement(btn.dataset.req);
        });
      });
    }

    function bindCardActions(item) {
      const key = String(item.req_id).replace(/[^a-zA-Z0-9_-]/g, '_');
      const editBtn = document.getElementById('edit-' + key);
      const removeBtn = document.getElementById('remove-' + key);
      const editWrap = document.getElementById('wrap-edit-' + key);

      if (editBtn && editWrap) {
        editBtn.addEventListener('click', () => {
          editWrap.style.display = 'flex';
        });
      }

      if (removeBtn) {
        removeBtn.addEventListener('click', async () => {
          const confirmed = window.confirm('Remove this requirement?');
          if (!confirmed) return;
          await removeRequirement(item);
        });
      }
    }

    async function removeRequirement(item) {
      try {
        const featureId = item._feature_id || item.req_id;
        if (!featureId) {
          showToast('This item cannot be removed from this view', 'warning');
          return;
        }

        const res = await apiFetch('/api/features/' + encodeURIComponent(featureId), {
          method: 'DELETE'
        });
        if (!res.ok) throw new Error();

        allRequirements = allRequirements.filter(r => String(r.req_id) !== String(item.req_id));
        renderRequirements();
        renderPills();
        showToast('Requirement removed', 'success');
      } catch (e) {
        showToast('Unable to remove requirement', 'error');
      }
    }

    async function saveRequirement(reqId) {
      try {
        const key = String(reqId).replace(/[^a-zA-Z0-9_-]/g, '_');
        const title = document.getElementById('title-edit-' + key).value.trim();
        const description = document.getElementById('desc-edit-' + key).value.trim();
        const existing = allRequirements.find(r => String(r.req_id) === String(reqId));

        let res;
        if (existing && existing._source === 'feature' && existing._feature_id) {
          // Feature records don't expose editable title/description fields, so keep edits in feedback.
          res = await apiFetch('/api/features/' + encodeURIComponent(existing._feature_id), {
            method: 'PUT',
            body: JSON.stringify({ feedback: description })
          });
        } else {
          res = await apiFetch('/requirements/' + encodeURIComponent(reqId), {
            method: 'PUT',
            body: JSON.stringify({ title, description })
          });
        }
        if (!res.ok) throw new Error();

        const idx = allRequirements.findIndex(r => String(r.req_id) === String(reqId));
        if (idx >= 0) {
          allRequirements[idx].title = title;
          allRequirements[idx].description = description;
        }
        renderRequirements();
        renderPills();
        showToast('Requirement updated', 'success');
      } catch (e) {
        showToast('Something went wrong', 'error');
      }
    }

    async function loadFileListForPicker() {
      try {
        let files = [];

        const res = await apiFetch('/files');
        if (res.ok) {
          const data = await res.json();
          files = data.files || [];
        }

        if (!files.length) {
          const docsRes = await apiFetch('/api/documents');
          if (docsRes.ok) {
            const docsData = await docsRes.json();
            files = (docsData.documents || []).map(doc => ({
              id: doc.id,
              filename: doc.filename,
              status: 'complete'
            }));
          }
        }

        const picker = document.getElementById('fileSelect');

        if (!files.length) {
          picker.innerHTML = '<option value="">No complete files available</option>';
          return;
        }

        picker.innerHTML = files.map(f => '<option value="' + f.id + '">' + f.filename + '</option>').join('');
        if (!currentFileId) {
          const withRequirements = files.find(f => Number(f.requirements_count || f.feature_count || 0) > 0);
          currentFileId = String((withRequirements || files[0]).id);
        }
        picker.value = String(currentFileId);
        picker.addEventListener('change', () => {
          currentFileId = picker.value;
          const url = new URL(window.location.href);
          url.searchParams.set('file_id', currentFileId);
          window.history.replaceState({}, '', url.toString());
          loadRequirements();
        });
      } catch (e) {
        showToast('Something went wrong', 'error');
      }
    }

    async function fetchRequirementsForFile(fileId) {
      const reqRes = await apiFetch('/requirements/' + encodeURIComponent(fileId));
      if (reqRes.ok) {
        const reqData = await reqRes.json();
        const parsed = parseRequirementsPayload(reqData);
        if (parsed.length) {
          return parsed;
        }
      }

      const featuresRes = await apiFetch('/api/features?file_id=' + encodeURIComponent(fileId));
      if (featuresRes.ok) {
        const featuresData = await featuresRes.json();
        const parsed = parseRequirementsPayload(featuresData);
        if (parsed.length) {
          return parsed;
        }
      }

      return [];
    }

    async function loadRequirements() {
      if (!currentFileId) {
        document.getElementById('requirementsViewSection').innerHTML = '<div class="empty-state">Select a document to view requirements.</div>';
        visualInsights = { detected_patterns: 0, images_detected: 0, images: [] };
        renderInsights();
        document.getElementById('reqTopSub').textContent = 'No file selected';
        return;
      }

      renderLoading();
      try {
        const fileRes = await apiFetch('/files/' + encodeURIComponent(currentFileId));
        if (fileRes.ok) {
          const fileData = await fileRes.json();
          currentFilename = fileData.filename || '';
        } else {
          currentFilename = 'Selected file';
        }

        allRequirements = await fetchRequirementsForFile(currentFileId);
        renderPills();
        renderRequirements();
        await loadVisualInsights();
      } catch (e) {
        allRequirements = [];
        renderPills();
        renderRequirements();
        visualInsights = { detected_patterns: 0, images_detected: 0, images: [] };
        renderInsights();
        showToast('Something went wrong', 'error');
      }
    }

    async function exportAllCsv() {
      if (!currentFileId) {
        showToast('Please select a document first', 'error');
        return;
      }

      if (!allRequirements.length) {
        showToast('No requirements to export', 'error');
        return;
      }

      const escapeCsv = (value) => {
        const text = String(value == null ? '' : value);
        if (/[",\n]/.test(text)) {
          return '"' + text.replace(/"/g, '""') + '"';
        }
        return text;
      };

      try {
        const headers = ['req_id', 'title', 'description', 'category', 'priority'];
        const rows = allRequirements.map(item => [
          item.req_id,
          item.title,
          item.description,
          normalizeType(item.category),
          item.priority || 'Medium'
        ]);

        const csv = [headers, ...rows]
          .map(row => row.map(escapeCsv).join(','))
          .join('\n');

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const safeName = String((currentFilename || ('requirements_' + currentFileId)).replace(/\.[^/.]+$/, '')).replace(/[^a-zA-Z0-9_-]/g, '_');
        a.download = safeName + '_requirements.csv';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        showToast('CSV exported successfully', 'success');
      } catch (e) {
        showToast('Could not export CSV', 'error');
      }
    }

    function init() {
      setActivePage('requirements');
      loadUser();
      setActiveView(activeView);
      renderInsights();

      document.getElementById('searchInput').addEventListener('input', (e) => {
        searchTerm = String(e.target.value || '').toLowerCase();
        renderRequirements();
      });

      document.getElementById('exportAllBtn').addEventListener('click', exportAllCsv);
      document.getElementById('reqViewTab').addEventListener('click', () => setActiveView('requirements'));
      document.getElementById('insightViewTab').addEventListener('click', () => setActiveView('insights'));
      document.getElementById('insightModalClose').addEventListener('click', closeInsightModal);
      document.getElementById('insightModal').addEventListener('click', (e) => {
        if (e.target.id === 'insightModal') closeInsightModal();
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeInsightModal();
      });

      if (!currentFileId) {
        document.getElementById('filePickerWrap').style.display = 'block';
      }

      loadFileListForPicker().then(loadRequirements);
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
