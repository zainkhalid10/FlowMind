<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extract Documents - FlowMind</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .navbar {
            background: white;
            border-radius: 15px;
            padding: 20px 35px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid rgba(102, 126, 234, 0.1);
        }
        
        .navbar h2 {
            margin: 0;
            color: #667eea;
        }
        
        .navbar .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            border: 2px solid rgba(102, 126, 234, 0.1);
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
            border-color: rgba(102, 126, 234, 0.3);
        }
        
        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .card-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 1.5rem;
            color: white;
        }
        
        .card-icon.basic {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
        }
        
        .card-icon.agent {
            background: linear-gradient(135deg, #10b981, #059669);
        }
        
        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e293b;
        }
        
        .card-subtitle {
            font-size: 0.9rem;
            color: #64748b;
            margin-top: 5px;
        }
        
        .file-input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }
        
        .file-input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        
        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 45px;
            border: 2px dashed #e2e8f0;
            border-radius: 12px;
            background: #f8fafc;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .file-input-label:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
            border-width: 3px;
        }
        
        .btn {
            width: 100%;
            padding: 16px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: 2px solid transparent;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(102, 126, 234, 0.2);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);
        }
        
        .btn-success:hover {
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.4);
        }
        
        .progress-container {
            margin-top: 20px;
            display: none;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #10b981);
            width: 0%;
            transition: width 0.3s ease-out;
        }
        
        .progress-time {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 5px;
            font-weight: 500;
        }
        
        .output-container {
            margin-top: 25px;
            background: #0f172a;
            border-radius: 12px;
            padding: 25px;
            color: #e2e8f0;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.875rem;
            max-height: 400px;
            overflow-y: auto;
            display: none;
            border: 2px solid rgba(102, 126, 234, 0.2);
        }
        
        .output-container.show {
            display: block;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            
            .card {
                padding: 25px;
            }
            
            .navbar {
                flex-direction: column;
                gap: 15px;
                padding: 20px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .alert-danger {
            background: #fee2e2;
            color: #dc2626;
        }
        
        .alert-success {
            background: #d1fae5;
            color: #059669;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <h2><i class="fas fa-brain"></i> FlowMind</h2>
            <div class="user-info">
                <span id="username-display"></span>
                <a href="/approve" class="btn btn-sm" style="padding: 8px 16px; text-decoration: none; background: linear-gradient(135deg, #10b981, #059669); margin-right: 10px;">
                    <i class="fas fa-check-circle"></i> Approve
                </a>
                <a href="/dashboard" class="btn btn-sm" style="padding: 8px 16px; text-decoration: none;">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <button onclick="logout()" class="btn btn-sm" style="background: #ef4444; padding: 8px 16px;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
        
        <div class="header">
            <h1><i class="fas fa-file-upload"></i> Extract Documents</h1>
            <p>Upload and analyze your documents with AI-powered extraction</p>
        </div>
        
        <div class="main-content">
            <div class="card">
                <div class="card-header">
                    <div class="card-icon basic">
                        <i class="fas fa-file-text"></i>
                    </div>
                    <div>
                        <div class="card-title">Basic Extraction</div>
                        <div class="card-subtitle">Quick text and image extraction</div>
                    </div>
                </div>
                
                <div id="basic-alert"></div>
                
                <form id="form-basic">
                    <div class="file-input-wrapper">
                        <input type="file" id="basic-file" class="file-input" accept=".pdf,.doc,.docx,.ppt,.pptx,.txt,.png,.jpg,.jpeg" required>
                        <label for="basic-file" class="file-input-label">
                            <i class="fas fa-cloud-upload-alt"></i> Choose file to analyze
                        </label>
                    </div>
                    
                    <button type="submit" class="btn" id="basic-submit">
                        <i class="fas fa-play"></i> Extract Content
                    </button>
                    
                    <div class="progress-container" id="basic-progress">
                        <div class="progress-bar">
                            <div class="progress-fill" id="basic-progress-bar"></div>
                        </div>
                        <div style="text-align: center; color: #64748b; font-size: 0.875rem;" id="basic-progress-text">Processing...</div>
                        <div class="progress-time" id="basic-progress-time" style="text-align: center;"></div>
                    </div>
                    
                    <div class="output-container" id="basic-output"></div>
                </form>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <div class="card-icon agent">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div>
                        <div class="card-title">AI Agent Analysis</div>
                        <div class="card-subtitle">Advanced RAG-powered requirements extraction</div>
                    </div>
                </div>
                
                <div id="agent-alert"></div>
                
                <form id="form-agent">
                    <div class="file-input-wrapper">
                        <input type="file" id="agent-file" class="file-input" accept=".pdf,.doc,.docx,.ppt,.pptx,.txt,.png,.jpg,.jpeg" required>
                        <label for="agent-file" class="file-input-label">
                            <i class="fas fa-cloud-upload-alt"></i> Choose file for AI analysis
                        </label>
                    </div>
                    
                    <button type="submit" class="btn" id="agent-submit">
                        <i class="fas fa-magic"></i> Analyze with AI
                    </button>
                    
                    <div class="progress-container" id="agent-progress">
                        <div class="progress-bar">
                            <div class="progress-fill" id="agent-progress-bar"></div>
                        </div>
                        <div style="text-align: center; color: #64748b; font-size: 0.875rem;" id="agent-progress-text">Processing...</div>
                        <div class="progress-time" id="agent-progress-time" style="text-align: center;"></div>
                    </div>
                    
                    <div class="output-container" id="agent-output"></div>
                </form>
            </div>
            
            <div class="card" id="learning-status-card" style="grid-column: 1 / -1; cursor: pointer;" onclick="window.location.href='/training'">
                <div style="text-align: center; padding: 20px;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: #667eea;"></i>
                    <p style="margin-top: 10px; color: #64748b;">Loading learning status...</p>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Check authentication and validate token
        (function() {
            try {
                const token = localStorage.getItem('access_token');
                const userStr = localStorage.getItem('user');
                
                console.log('Extract Page: Token check:', token ? 'Token exists' : 'No token');
                console.log('Extract Page: User check:', userStr ? 'User exists' : 'No user');
                
                if (!token || !userStr) {
                    console.log('Extract Page: Missing token or user, redirecting to login');
                    window.location.href = '/';
                    return;
                }
                
                // Validate token format
                if (token.split('.').length !== 3) {
                    console.error('Extract Page: Invalid token format');
                    localStorage.removeItem('access_token');
                    localStorage.removeItem('user');
                    window.location.href = '/';
                    return;
                }
                
                const user = JSON.parse(userStr);
                const usernameDisplay = document.getElementById('username-display');
                if (usernameDisplay) {
                    usernameDisplay.textContent = `Welcome, ${user.username || user.email}`;
                }
                console.log('Extract Page: User authenticated:', user.username || user.email);
            } catch (e) {
                console.error('Extract Page: Error in auth check:', e);
                // Don't redirect on error, just log it - let user continue
            }
        })();
        
        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('user');
            window.location.href = '/';
        }
        
        function showAlert(containerId, message, type = 'danger') {
            const container = document.getElementById(containerId);
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }
        
        function showError(containerId, message) {
            showAlert(containerId, message, 'danger');
        }
        
        function showSuccess(containerId, message) {
            showAlert(containerId, message, 'success');
        }
        
        // Store last results for JSON viewing
        let lastBasicResult = null;
        let lastAgentResult = null;
        
        // Enhanced progress polling function with time estimation
        function startProgressPolling(trackerId, progressBar, progressText, timeElement) {
            let pollCount = 0;
            const maxPolls = 600; // 5 minutes max (600 * 500ms)
            
            const interval = setInterval(async () => {
                pollCount++;
                if (pollCount > maxPolls) {
                    clearInterval(interval);
                    return;
                }
                
                try {
                    const token = localStorage.getItem('access_token');
                    const response = await fetch(`/api/progress/${trackerId}`, {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    
                    if (response.ok) {
                        const progress = await response.json();
                        const progressValue = Math.min(progress.progress || 0, 99);
                        
                        // Update progress bar
                        progressBar.style.width = `${progressValue}%`;
                        
                        // Update progress text with stage info
                        let message = progress.message || progress.current_stage || 'Processing...';
                        if (progressValue > 0) {
                            message += ` (${Math.round(progressValue)}%)`;
                        }
                        progressText.textContent = message;
                        
                        // Update estimated time
                        if (timeElement && progress.estimated_time_remaining) {
                            timeElement.textContent = `⏱️ Estimated time remaining: ${progress.estimated_time_remaining}`;
                        } else if (timeElement && progress.elapsed_time) {
                            timeElement.textContent = `⏱️ Elapsed: ${Math.round(progress.elapsed_time)}s`;
                        }
                        
                        // Check if complete
                        if (progress.progress >= 100 || progress.stage === 'complete') {
                            clearInterval(interval);
                            progressBar.style.width = '100%';
                            progressText.textContent = 'Complete!';
                            if (timeElement) {
                                timeElement.textContent = '✅ Processing complete';
                            }
                            return; // Exit polling
                        }
                    } else if (response.status === 404) {
                        // Tracker not found, stop polling
                        clearInterval(interval);
                    }
                } catch (error) {
                    console.error('Progress polling error:', error);
                    // Continue polling on error
                }
            }, 500); // Poll every 500ms
            
            return interval;
        }
        
        // Legacy progress polling function (kept for compatibility)
        let progressInterval = null;
        
        async function pollProgress(taskId, progressBar, progressText, intervalRef) {
            if (intervalRef && intervalRef.current) {
                clearInterval(intervalRef.current);
            }
            
            intervalRef.current = setInterval(async () => {
                try {
                    const response = await fetch(`/api/progress/${taskId}`);
                    if (response.ok) {
                        const progress = await response.json();
                        const progressValue = Math.min(progress.progress || 0, 99);
                        progressBar.style.width = `${progressValue}%`;
                        progressText.textContent = progress.message || `Processing... ${progressValue}%`;
                        
                        console.log('Progress update:', progress.stage, progressValue + '%', progress.message);
                        
                        if (progress.stage === 'complete' || progress.progress >= 100) {
                            if (intervalRef && intervalRef.current) {
                                clearInterval(intervalRef.current);
                                intervalRef.current = null;
                            }
                            progressBar.style.width = '100%';
                            progressText.textContent = 'Complete!';
                        }
                    } else {
                        console.warn('Progress fetch failed:', response.status);
                    }
                } catch (error) {
                    console.error('Error polling progress:', error);
                }
            }, 500); // Poll every 500ms for smoother updates
        }
        
        // Store progress intervals per form
        // Removed polling - using simple progress bar instead
        
        // Load learning status on page load
        async function loadLearningStatus() {
            try {
                const token = localStorage.getItem('access_token');
                if (!token) {
                    console.log('No token, skipping learning status load');
                    return;
                }
                
                // Add timeout to prevent hanging
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000); // 5 second timeout
                
                const response = await fetch('/api/training-status', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                if (response.ok) {
                    const status = await response.json();
                    updateLearningStatusCard(status);
                } else {
                    console.warn('Failed to load learning status:', response.status);
                    // Show default state if request fails
                    updateLearningStatusCard({ total_learned_patterns: 0, total_documents_processed: 0, learning_iterations: 0 });
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    console.warn('Learning status request timed out');
                } else {
                    console.error('Error loading learning status:', error);
                }
                // Show default state on error
                updateLearningStatusCard({ total_learned_patterns: 0, total_documents_processed: 0, learning_iterations: 0 });
            }
        }
        
        function updateLearningStatusCard(status) {
            const card = document.getElementById('learning-status-card');
            if (!card) return;
            
            const totalPatterns = status.total_learned_patterns || 0;
            const totalDocs = status.total_documents_processed || 0;
            const learningIterations = status.learning_iterations || 0;
            
            card.innerHTML = `
                <div style="display: flex; align-items: center; margin-bottom: 15px;">
                    <div style="width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; margin-right: 15px;">
                        <i class="fas fa-brain" style="color: white; font-size: 1.2rem;"></i>
                    </div>
                    <div>
                        <div style="font-weight: 600; color: #1e293b; font-size: 1.1rem;">Model Learning Status</div>
                        <div style="color: #64748b; font-size: 0.9rem;">Click to view details</div>
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 15px;">
                    <div style="text-align: center; padding: 15px; background: #f8fafc; border-radius: 8px;">
                        <div style="font-size: 1.8rem; font-weight: 700; color: #667eea;">${totalPatterns}</div>
                        <div style="color: #64748b; font-size: 0.85rem; margin-top: 5px;">Patterns</div>
                    </div>
                    <div style="text-align: center; padding: 15px; background: #f8fafc; border-radius: 8px;">
                        <div style="font-size: 1.8rem; font-weight: 700; color: #667eea;">${totalDocs}</div>
                        <div style="color: #64748b; font-size: 0.85rem; margin-top: 5px;">Documents</div>
                    </div>
                    <div style="text-align: center; padding: 15px; background: #f8fafc; border-radius: 8px;">
                        <div style="font-size: 1.8rem; font-weight: 700; color: #667eea;">${learningIterations}</div>
                        <div style="color: #64748b; font-size: 0.85rem; margin-top: 5px;">Iterations</div>
                    </div>
                </div>
                <a href="/training" style="display: block; text-align: center; margin-top: 15px; padding: 10px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; text-decoration: none; border-radius: 8px; font-weight: 500;">
                    <i class="fas fa-graduation-cap"></i> View Training Dashboard
                </a>
            `;
        }
        
        // Load learning status asynchronously without blocking page render
        // Use setTimeout to ensure page is fully rendered first
        // Only load once per page load to reduce server load
        let learningStatusLoaded = false;
        setTimeout(() => {
            if (!learningStatusLoaded) {
                loadLearningStatus();
                learningStatusLoaded = true;
            }
        }, 1000); // Delay to ensure page is fully rendered first
        
        function formatExtractionResults(data, type) {
            // Store data for JSON viewing
            if (type === 'basic') {
                lastBasicResult = data;
            }
            
            let html = '<div style="color: #e2e8f0;">';
            html += `<h3 style="color: #10b981; margin-bottom: 15px;"><i class="fas fa-check-circle"></i> Extraction Results</h3>`;
            
            if (data.filename) {
                html += `<p><strong style="color: #60a5fa;">Filename:</strong> ${escapeHtml(data.filename)}</p>`;
            }
            
            if (data.summary) {
                html += `<div style="background: rgba(16, 185, 129, 0.1); padding: 15px; border-radius: 8px; margin: 15px 0;">`;
                html += `<strong style="color: #10b981;">Summary:</strong><br>`;
                html += `<p style="margin-top: 8px; line-height: 1.6;">${escapeHtml(data.summary)}</p>`;
                html += `</div>`;
            }
            
            if (data.images_detected !== undefined) {
                html += `<p><strong style="color: #60a5fa;">Images Detected:</strong> ${data.images_detected}</p>`;
            }
            
            if (data.images && data.images.length > 0) {
                html += `<div style="margin-top: 20px;">`;
                html += `<strong style="color: #60a5fa;">Image Details:</strong>`;
                data.images.forEach((img, idx) => {
                    html += `<div style="background: rgba(96, 165, 250, 0.1); padding: 12px; border-radius: 8px; margin-top: 10px;">`;
                    html += `<p><strong>Image ${idx + 1}</strong> - Page ${img.page || 'N/A'}</p>`;
                    if (img.ocr) {
                        html += `<p style="font-size: 0.85rem; color: #94a3b8;">OCR Text: ${escapeHtml(img.ocr.substring(0, 200))}${img.ocr.length > 200 ? '...' : ''}</p>`;
                    }
                    if (img.summary) {
                        html += `<p style="font-size: 0.85rem; color: #10b981;">Summary: ${escapeHtml(img.summary)}</p>`;
                    }
                    html += `</div>`;
                });
                html += `</div>`;
            }
            
            html += `<div style="margin-top: 30px; padding-top: 25px; border-top: 2px solid rgba(255,255,255,0.15); text-align: center;">`;
            html += `<p style="color: #94a3b8; margin-bottom: 20px; font-size: 0.9rem;">Extraction completed successfully!</p>`;
            html += `<button onclick="window.location.href='/dashboard'" class="btn" style="width: auto; padding: 12px 30px; display: inline-block;">`;
            html += `<i class="fas fa-tachometer-alt"></i> Go to Dashboard</button>`;
            html += `</div>`;
            
            html += '</div>';
            return html;
        }
        
        function formatAIResults(data, type) {
            // Store data for JSON viewing
            if (type === 'agent') {
                lastAgentResult = data;
            }
            
            let html = '<div style="color: #e2e8f0;">';
            html += `<h3 style="color: #10b981; margin-bottom: 15px;"><i class="fas fa-robot"></i> AI Analysis Results</h3>`;
            
            if (data.filename) {
                html += `<p><strong style="color: #60a5fa;">Filename:</strong> ${escapeHtml(data.filename)}</p>`;
            }
            
            if (data.extraction_summary) {
                html += `<div style="background: rgba(16, 185, 129, 0.1); padding: 15px; border-radius: 8px; margin: 15px 0;">`;
                html += `<strong style="color: #10b981;">Extraction Summary:</strong><br>`;
                html += `<p style="margin-top: 8px;">${escapeHtml(data.extraction_summary)}</p>`;
                html += `</div>`;
            }
            
            if (data.agent_processing) {
                html += `<div style="background: rgba(139, 92, 246, 0.1); padding: 15px; border-radius: 8px; margin: 15px 0;">`;
                html += `<strong style="color: #8b5cf6;">AI Agent Processing:</strong><br>`;
                if (data.agent_processing.message) {
                    html += `<p style="margin-top: 8px; line-height: 1.6;">${escapeHtml(data.agent_processing.message)}</p>`;
                }
                if (data.agent_processing.response) {
                    html += `<p style="margin-top: 8px; line-height: 1.6; color: #c084fc;">${escapeHtml(data.agent_processing.response)}</p>`;
                }
                html += `</div>`;
            }
            
            if (data.requirements_extraction) {
                html += `<div style="background: rgba(236, 72, 153, 0.1); padding: 15px; border-radius: 8px; margin: 15px 0;">`;
                html += `<strong style="color: #ec4899;">Requirements Extraction:</strong><br>`;
                const reqResponse = data.requirements_extraction.response || data.requirements_extraction.message || '';
                if (reqResponse && reqResponse.trim() && reqResponse !== '0' && reqResponse !== 0) {
                    html += `<p style="margin-top: 8px; line-height: 1.6; white-space: pre-wrap;">${escapeHtml(String(reqResponse))}</p>`;
                } else {
                    html += `<p style="margin-top: 8px; color: #94a3b8; font-style: italic;">No requirements extracted. The document may not contain structured requirements.</p>`;
                }
                // Show status if available
                if (data.requirements_extraction.status) {
                    html += `<p style="margin-top: 8px; font-size: 0.9rem; color: #60a5fa;"><strong>Status:</strong> ${escapeHtml(data.requirements_extraction.status)}</p>`;
                }
                html += `</div>`;
            }
            
            if (data.images_detected !== undefined) {
                html += `<p><strong style="color: #60a5fa;">Images Detected:</strong> ${data.images_detected}</p>`;
            }
            
            html += `<div style="margin-top: 30px; padding-top: 25px; border-top: 2px solid rgba(255,255,255,0.15); text-align: center;">`;
            
            // Only show "View Result" button if view_id exists
            if (data.view_id) {
                html += `<a href="/view_requirements/${data.view_id}" target="_blank" class="btn btn-success" style="text-decoration: none; display: inline-block; width: 100%; padding: 16px 30px; font-size: 1.1rem; box-shadow: 0 6px 20px rgba(16, 185, 129, 0.3);">`;
                html += `<i class="fas fa-eye"></i> View Results</a>`;
            } else {
                html += `<p style="color: #94a3b8; margin-bottom: 20px; font-size: 0.9rem;">Analysis completed successfully!</p>`;
                html += `<button onclick="window.location.href='/dashboard'" class="btn" style="width: auto; padding: 12px 30px; display: inline-block;">`;
                html += `<i class="fas fa-tachometer-alt"></i> Go to Dashboard</button>`;
            }
            
            html += `</div>`;
            
            html += '</div>';
            return html;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showRawJSON(type) {
            const output = document.getElementById(type + '-output');
            let data = null;
            if (type === 'basic') {
                data = lastBasicResult;
            } else if (type === 'agent') {
                data = lastAgentResult;
            }
            
            if (data) {
                output.innerHTML = '<pre style="color: #e2e8f0; white-space: pre-wrap; word-wrap: break-word;">' + JSON.stringify(data, null, 2) + '</pre>';
            } else {
                output.innerHTML = '<pre style="color: #e2e8f0;">No data available</pre>';
            }
        }
        
        // Basic extraction form
        const basicForm = document.getElementById('form-basic');
        if (!basicForm) {
            console.error('Basic form not found');
        } else {
            basicForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const fileInput = document.getElementById('basic-file');
                const submitBtn = document.getElementById('basic-submit');
                const output = document.getElementById('basic-output');
                const progress = document.getElementById('basic-progress');
                const progressBar = document.getElementById('basic-progress-bar');
                const progressText = document.getElementById('basic-progress-text');
                
                if (!fileInput.files[0]) {
                    showError('basic-alert', 'Please select a file first.');
                    return;
                }
                
                // Get fresh token from localStorage
                const token = localStorage.getItem('access_token');
                console.log('Extract Basic: Token retrieved:', token ? 'Token exists' : 'No token');
                
                if (!token) {
                    showError('basic-alert', 'Please login to upload files.');
                    window.location.href = '/';
                    return;
                }
                
                // Validate token format
                if (token.split('.').length !== 3) {
                    console.error('Extract Basic: Invalid token format');
                    showError('basic-alert', 'Invalid authentication token. Please login again.');
                    localStorage.removeItem('access_token');
                    localStorage.removeItem('user');
                    setTimeout(() => window.location.href = '/', 2000);
                    return;
                }
                
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
                output.classList.remove('show');
                progress.style.display = 'block';
                progressBar.style.width = '0%';
                progressText.textContent = 'Uploading...';
                
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                
                try {
                console.log('Extract Basic: Making request to /upload_client_doc');
                console.log('Extract Basic: Token length:', token ? token.length : 0);
                console.log('Extract Basic: Token preview:', token ? token.substring(0, 20) + '...' : 'No token');
                
                const response = await fetch('/upload_client_doc', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                        // Don't set Content-Type for FormData - browser will set it with boundary
                    },
                    credentials: 'include',  // Include credentials for CORS
                    body: formData
                });
                
                console.log('Extract Basic: Response headers:', [...response.headers.entries()]);
                
                console.log('Extract Basic: Response status:', response.status);
                
                // Start polling for progress if we get a tracker ID
                let progressPollInterval = null;
                
                if (response.ok) {
                    const data = await response.json();
                    
                    // Start progress polling if tracker ID is available
                    if (data.progress_tracker_id) {
                        progressPollInterval = startProgressPolling(
                            data.progress_tracker_id,
                            progressBar,
                            progressText,
                            document.getElementById('basic-progress-time')
                        );
                        // Don't clear immediately - let it poll until complete
                    }
                    
                    // Format the output nicely
                    output.innerHTML = formatExtractionResults(data, 'basic');
                    output.classList.add('show');
                    showSuccess('basic-alert', 'Extraction completed successfully!');
                    
                    // Final progress update
                    progressBar.style.width = '100%';
                    progressText.textContent = 'Complete!';
                    document.getElementById('basic-progress-time').textContent = '';
                } else {
                    let errorMessage = 'Upload failed. Please try again.';
                    try {
                        const error = await response.json();
                        errorMessage = error.detail || errorMessage;
                        // If authentication error, redirect to login
                        if (response.status === 401 || response.status === 403) {
                            localStorage.removeItem('access_token');
                            localStorage.removeItem('user');
                            showError('basic-alert', 'Authentication failed. Redirecting to login...');
                            setTimeout(() => window.location.href = '/', 2000);
                            return;
                        }
                    } catch (e) {
                        errorMessage = `Error ${response.status}: ${response.statusText}`;
                    }
                    showError('basic-alert', errorMessage);
                }
            } catch (error) {
                showError('basic-alert', 'Network error. Please check your connection.');
                if (progressPollInterval) {
                    clearInterval(progressPollInterval);
                }
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-play"></i> Extract Content';
                setTimeout(() => {
                    progress.style.display = 'none';
                }, 2000);
            }
        });
        } // Close basicForm else block
        
        // AI Agent form
        const agentForm = document.getElementById('form-agent');
        if (!agentForm) {
            console.error('Agent form not found');
        } else {
            agentForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const fileInput = document.getElementById('agent-file');
                const submitBtn = document.getElementById('agent-submit');
                const output = document.getElementById('agent-output');
                const progress = document.getElementById('agent-progress');
                const progressBar = document.getElementById('agent-progress-bar');
                const progressText = document.getElementById('agent-progress-text');
                
                if (!fileInput.files[0]) {
                    showError('agent-alert', 'Please select a file first.');
                    return;
                }
                
                // Get fresh token from localStorage
                const token = localStorage.getItem('access_token');
                console.log('Extract Agent: Token retrieved:', token ? 'Token exists' : 'No token');
                
                if (!token) {
                    showError('agent-alert', 'Please login to upload files.');
                    window.location.href = '/';
                    return;
                }
                
                // Validate token format
                if (token.split('.').length !== 3) {
                    console.error('Extract Agent: Invalid token format');
                    showError('agent-alert', 'Invalid authentication token. Please login again.');
                    localStorage.removeItem('access_token');
                    localStorage.removeItem('user');
                    setTimeout(() => window.location.href = '/', 2000);
                    return;
                }
                
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
                output.classList.remove('show');
                progress.style.display = 'block';
                progressBar.style.width = '0%';
                progressText.textContent = 'Preparing upload...';
                
                const timeElement = document.getElementById('agent-progress-time');
                if (timeElement) {
                    timeElement.textContent = '';
                }
                
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                
                let progressPollInterval = null;
                
                try {
                console.log('Extract Agent: Making request to /upload_agent_doc');
                console.log('Extract Agent: Token length:', token ? token.length : 0);
                console.log('Extract Agent: Token preview:', token ? token.substring(0, 20) + '...' : 'No token');
                
                // Start showing upload progress immediately
                progressBar.style.width = '10%';
                progressText.textContent = 'Uploading file...';
                
                const response = await fetch('/upload_agent_doc', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                        // Don't set Content-Type for FormData - browser will set it with boundary
                    },
                    credentials: 'include',  // Include credentials for CORS
                    body: formData
                });
                
                console.log('Extract Agent: Response headers:', [...response.headers.entries()]);
                console.log('Extract Agent: Response status:', response.status);
                
                if (response.ok) {
                    const data = await response.json();
                    
                    console.log('Extract Agent: Result received:', data);
                    console.log('Extract Agent: Result type:', typeof data);
                    console.log('Extract Agent: Result keys:', Object.keys(data || {}));
                    console.log('Extract Agent: Progress tracker ID:', data.progress_tracker_id);
                    
                    // Start progress polling immediately if tracker ID is available
                    if (data.progress_tracker_id) {
                        console.log('Extract Agent: Starting progress polling with tracker:', data.progress_tracker_id);
                        progressPollInterval = startProgressPolling(
                            data.progress_tracker_id,
                            progressBar,
                            progressText,
                            timeElement
                        );
                        
                        // Poll for a bit to get progress updates
                        await new Promise(resolve => setTimeout(resolve, 2000));
                    } else {
                        console.warn('Extract Agent: No progress tracker ID in response');
                        // Fallback: Show processing
                        progressBar.style.width = '90%';
                        progressText.textContent = 'Processing... 90%';
                    }
                    
                    // Display results
                    if (data && data.requirements_extraction) {
                        console.log('✅ requirements_extraction exists:', data.requirements_extraction);
                        console.log('✅ requirements_extraction.response:', data.requirements_extraction.response);
                        console.log('✅ requirements_extraction.response length:', data.requirements_extraction.response?.length || 0);
                        
                        output.innerHTML = formatAIResults(data, 'agent');
                        output.classList.add('show');
                        showSuccess('agent-alert', 'AI analysis completed successfully!');
                        // Reload learning status after processing
                        loadLearningStatus();
                    } else {
                        console.warn('⚠️ requirements_extraction missing from result');
                        showError('agent-alert', 'Processing completed but no requirements were extracted. Please check the document.');
                    }
                    
                    // Finalize progress
                    if (progressPollInterval) {
                        // Wait a bit more for final progress updates
                        setTimeout(() => {
                            clearInterval(progressPollInterval);
                            progressBar.style.width = '100%';
                            progressText.textContent = 'Complete!';
                            if (timeElement) {
                                timeElement.textContent = '✅ Processing complete';
                            }
                        }, 1000);
                    } else {
                        progressBar.style.width = '100%';
                        progressText.textContent = 'Complete!';
                        if (timeElement) {
                            timeElement.textContent = '✅ Processing complete';
                        }
                    }
                    
                    // Re-enable button
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-magic"></i> Analyze with AI';
                    
                    // Hide progress bar after a delay
                    setTimeout(() => {
                        progress.style.display = 'none';
                    }, 2000);
                } else {
                    // Handle error response
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-magic"></i> Analyze with AI';
                    progressBar.style.width = '100%';
                    progressText.textContent = 'Error occurred';
                    setTimeout(() => {
                        progress.style.display = 'none';
                    }, 2000);
                    
                    let errorMessage = 'Upload failed. Please try again.';
                    try {
                        const errorText = await response.text();
                        try {
                            const error = JSON.parse(errorText);
                            errorMessage = error.detail || errorMessage;
                        } catch (e) {
                            errorMessage = errorText || `Error ${response.status}: ${response.statusText}`;
                        }
                        // If authentication error, redirect to login
                        if (response.status === 401 || response.status === 403) {
                            localStorage.removeItem('access_token');
                            localStorage.removeItem('user');
                            showError('agent-alert', 'Authentication failed. Redirecting to login...');
                            setTimeout(() => window.location.href = '/', 2000);
                            return;
                        }
                    } catch (e) {
                        errorMessage = `Error ${response.status}: ${response.statusText}`;
                    }
                    showError('agent-alert', errorMessage);
                }
            } catch (error) {
                console.error('Extract Agent: Error:', error);
                showError('agent-alert', 'Network error. Please check your connection.');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-magic"></i> Analyze with AI';
                progressBar.style.width = '100%';
                progressText.textContent = 'Error occurred';
                setTimeout(() => {
                    progress.style.display = 'none';
                }, 2000);
            }
        });
        } // Close agentForm if block
        
        // File input labels
        try {
            const basicFileInput = document.getElementById('basic-file');
            if (basicFileInput) {
                basicFileInput.addEventListener('change', function() {
                    const label = this.nextElementSibling;
                    if (this.files[0]) {
                        label.innerHTML = `<i class="fas fa-file"></i> ${this.files[0].name}`;
                        label.style.borderColor = '#10b981';
                        label.style.background = 'rgba(16, 185, 129, 0.05)';
                    }
                });
            }
            
            const agentFileInput = document.getElementById('agent-file');
            if (agentFileInput) {
                agentFileInput.addEventListener('change', function() {
                    const label = this.nextElementSibling;
                    if (label && this.files[0]) {
                        label.innerHTML = `<i class="fas fa-file"></i> ${this.files[0].name}`;
                        label.style.borderColor = '#10b981';
                        label.style.background = 'rgba(16, 185, 129, 0.05)';
                    }
                });
            }
        } catch (error) {
            console.error('Error setting up file input listeners:', error);
        }
    </script>
</body>
</html>
